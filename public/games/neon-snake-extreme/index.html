<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Neon Snake Extreme ????????</title>
  <script src="/sdk/rnf-game-sdk.js?v=20260723c"></script>
</head>
<body>
<script>
RNF.init();
var shell = RNF.buildShell({
  title: "Neon Snake Extreme",
  creator: "CyberViper_Studio",
  subtitle: "????WASD ?? ?Shift ???? ????? ??? Bullet Time ??? D-pad???",
  width: 960,
  height: 520,
  bgmStyle: "pulse",
  highlights: ["????", "????", "????", "?? D-pad", "???"],
  help: {
    about: "?????????????????????????????????????????????????????",
    features: [
      "??????????????????????",
      "????????????????",
      "???????????? ? ??? Combo ??",
      "?????????????????",
      "????????????????"
    ],
    controls: [
      "???? ? WASD?????????",
      "Shift??????????????????",
      "?? D-pad ????????",
      "???????????????????????"
    ],
    tips: [
      "?? ? ?????????? 3 ?",
      "Combo ?????????????",
      "??????????????????",
      "?????????????????????"
    ]
  },
  onStop: cleanup,
  onStart: startGame
});

var W = shell.width, H = shell.height;
var ctx = shell.ctx, canvas = shell.canvas;
var particles = shell.particles;
var animId = null, running = false, keys = {};
var GRID = 20, COLS = W / GRID, ROWS = H / GRID;

var snake, dir, nextDir, dirQueue, foods, obstacles;
var score, combo, comboTimer, maxCombo, nitro, nitroFuel;
var bulletTime, nearMiss, baseSpeed, moveTimer, moveProgress, gameEnded;
var speedScale = 1, diffId = "normal", animT = 0, intensity = 0;
var floaters = [], pulseRings = [], afterImages = [], scorePopFlash = 0;
var wallPulse = 0, comboFlash = 0;

var FOOD_CFG = {
  normal: { color: "#22d3ee", glow: "#22d3ee", pts: 10, label: "???" },
  combo:  { color: "#fbbf24", glow: "#f59e0b", pts: 18, label: "???" },
  star:   { color: "#fde68a", glow: "#fbbf24", pts: 30, label: "??" },
  nitro:  { color: "#f472b6", glow: "#ec4899", pts: 12, label: "???" },
  shrink: { color: "#a78bfa", glow: "#8b5cf6", pts: 8,  label: "???" },
  ghost:  { color: "#94a3b8", glow: "#64748b", pts: 22, label: "???" }
};

function cleanup() {
  shell.detachKeyboard();
  shell.detachTouchControls();
  running = false;
  if (animId) cancelAnimationFrame(animId);
  animId = null;
  window.removeEventListener("keydown", onKey);
  window.removeEventListener("keyup", onKeyUp);
}

function onKey(e) {
  keys[e.code] = true;
  var k = e.key.toLowerCase();
  var nd = null;
  if (k === "arrowup" || k === "w") nd = { x: 0, y: -1 };
  if (k === "arrowdown" || k === "s") nd = { x: 0, y: 1 };
  if (k === "arrowleft" || k === "a") nd = { x: -1, y: 0 };
  if (k === "arrowright" || k === "d") nd = { x: 1, y: 0 };
  if (nd) { e.preventDefault(); queueDir(nd); }
}

function onKeyUp(e) { keys[e.code] = false; }

function queueDir(nd) {
  var base = dirQueue.length ? dirQueue[dirQueue.length - 1]
    : (nextDir.x !== dir.x || nextDir.y !== dir.y ? nextDir : dir);
  if (nd.x === -base.x && nd.y === -base.y) return;
  if (nd.x === base.x && nd.y === base.y) return;
  if (dirQueue.length < 2) dirQueue.push(nd);
}

function cellKey(x, y) { return x + "," + y; }

function occupiedMap() {
  var occupied = {};
  snake.forEach(function (s) { occupied[cellKey(s.x, s.y)] = true; });
  obstacles.forEach(function (o) { occupied[cellKey(Math.round(o.x), Math.round(o.y))] = true; });
  foods.forEach(function (f) { occupied[cellKey(f.x, f.y)] = true; });
  return occupied;
}

function randomEmptyCell(occupied) {
  var tries = 0, x, y;
  do {
    x = Math.floor(Math.random() * COLS);
    y = Math.floor(Math.random() * ROWS);
    tries++;
  } while (occupied[cellKey(x, y)] && tries < 300);
  if (occupied[cellKey(x, y)]) return null;
  occupied[cellKey(x, y)] = true;
  return { x: x, y: y };
}

function pickFoodType() {
  var r = Math.random();
  if (diffId === "easy") {
    if (r < 0.1) return "combo";
    if (r < 0.15) return "nitro";
    return "normal";
  }
  if (diffId === "normal") {
    if (r < 0.12) return "combo";
    if (r < 0.2) return "nitro";
    if (r < 0.24) return "ghost";
    return "normal";
  }
  if (r < 0.12) return "star";
  if (r < 0.24) return "combo";
  if (r < 0.34) return "nitro";
  if (r < 0.42 && snake.length > 6) return "shrink";
  if (r < 0.48) return "ghost";
  return "normal";
}

function spawnOneFood(occupied) {
  var cell = randomEmptyCell(occupied || occupiedMap());
  if (!cell) return null;
  return {
    x: cell.x, y: cell.y,
    type: pickFoodType(),
    pulse: Math.random() * Math.PI * 2,
    spin: Math.random() * Math.PI * 2,
    life: 0,
    ttl: diffId === "extreme" ? 14 : diffId === "hard" ? 20 : 0
  };
}

function ensureFoods() {
  var target = diffId === "extreme" ? 3 : diffId === "hard" ? 2 : 1;
  var occupied = occupiedMap();
  while (foods.length < target) {
    var f = spawnOneFood(occupied);
    if (!f) break;
    foods.push(f);
  }
}

function buildObstaclePatterns() {
  var list = [], margin = 2;
  [[margin, margin], [COLS - 1 - margin, margin], [margin, ROWS - 1 - margin], [COLS - 1 - margin, ROWS - 1 - margin]].forEach(function (c) {
    var sx = c[0] < COLS / 2 ? 1 : -1, sy = c[1] < ROWS / 2 ? 1 : -1;
    for (var i = 0; i < 3; i++) {
      list.push({ x: c[0] + i * sx, y: c[1] });
      list.push({ x: c[0], y: c[1] + i * sy });
    }
  });
  var midY = Math.floor(ROWS / 2), midX = Math.floor(COLS / 2);
  for (var x = 8; x < COLS - 8; x += 3) {
    if (Math.abs(x - midX) > 5) { list.push({ x: x, y: midY - 6 }); list.push({ x: x, y: midY + 6 }); }
  }
  if (diffId === "extreme") {
    for (var i = 0; i < 6; i++) {
      list.push({ x: midX - 8 + i, y: 4 });
      list.push({ x: midX - 8 + i, y: ROWS - 5 });
    }
  }
  return list;
}

function spawnObstacles() {
  obstacles = [];
  if (diffId !== "hard" && diffId !== "extreme") return;
  var count = diffId === "extreme" ? 16 : 10;
  var occupied = occupiedMap();
  var cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
  for (var i = -2; i <= 5; i++) {
    occupied[cellKey(cx - i, cy)] = true;
    occupied[cellKey(cx - i, cy - 1)] = true;
    occupied[cellKey(cx - i, cy + 1)] = true;
  }
  buildObstaclePatterns().forEach(function (p) {
    if (obstacles.length >= count) return;
    if (!occupied[cellKey(p.x, p.y)]) {
      occupied[cellKey(p.x, p.y)] = true;
      obstacles.push({
        x: p.x, y: p.y, hue: Math.random(), phase: Math.random() * Math.PI * 2,
        moving: diffId === "extreme" && Math.random() < 0.35,
        vx: (Math.random() < 0.5 ? 1 : -1) * (0.4 + Math.random() * 0.5),
        vy: 0
      });
    }
  });
  while (obstacles.length < count) {
    var cell = randomEmptyCell(occupied);
    if (!cell) break;
    if (Math.abs(cell.x - cx) < 4 && Math.abs(cell.y - cy) < 3) continue;
    obstacles.push({
      x: cell.x, y: cell.y, hue: Math.random(), phase: Math.random() * Math.PI * 2,
      moving: false, vx: 0, vy: 0
    });
  }
}

function isBlocked(x, y) {
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return true;
  for (var i = 0; i < obstacles.length; i++) {
    var o = obstacles[i];
    if (Math.round(o.x) === x && Math.round(o.y) === y) return true;
  }
  return false;
}

function checkNearMiss() {
  var head = snake[0], danger = false;
  for (var i = 3; i < snake.length; i++) {
    if (Math.abs(head.x - snake[i].x) + Math.abs(head.y - snake[i].y) === 1) danger = true;
  }
  obstacles.forEach(function (o) {
    if (Math.abs(head.x - Math.round(o.x)) + Math.abs(head.y - Math.round(o.y)) === 1) danger = true;
  });
  if (head.x <= 0 || head.x >= COLS - 1 || head.y <= 0 || head.y >= ROWS - 1) danger = true;
  if (isBlocked(head.x + dir.x, head.y + dir.y)) danger = true;
  if (danger && !nearMiss) {
    nearMiss = true;
    bulletTime = Math.max(bulletTime, 0.55);
    wallPulse = 1;
    RNF.sfx.power();
    shell.triggerShake(4, 0.15);
  }
  if (!danger) nearMiss = false;
}

function addFloater(x, y, text, color) {
  floaters.push({ x: x, y: y, text: text, color: color || "#fff", life: 0.9, vy: -40 });
}

function addPulseRing(x, y, color) {
  pulseRings.push({ x: x, y: y, color: color, r: 4, life: 0.45 });
}

function attachControls() {
  shell.attachKeyboard(keys);
  shell.attachTouchControls({
    keys: keys,
    forceVisible: false,
    buttons: [
      { code: "ArrowUp", label: "?", side: "left", hold: false, onPress: function () { queueDir({ x: 0, y: -1 }); } },
      { code: "ArrowDown", label: "?", side: "left", hold: false, onPress: function () { queueDir({ x: 0, y: 1 }); } },
      { code: "ArrowLeft", label: "?", side: "left", hold: false, onPress: function () { queueDir({ x: -1, y: 0 }); } },
      { code: "ArrowRight", label: "?", side: "left", hold: false, onPress: function () { queueDir({ x: 1, y: 0 }); } },
      { code: "ShiftLeft", label: "?", side: "right", hold: true, wide: true, danger: true }
    ],
    swipe: {
      threshold: 36,
      up: "ArrowUp", down: "ArrowDown", left: "ArrowLeft", right: "ArrowRight"
    }
  });
  window.addEventListener("keydown", onKey);
  window.addEventListener("keyup", onKeyUp);
}

function startGame() {
  cleanup();
  speedScale = shell.getSpeedScale();
  diffId = (shell.getDifficulty() || {}).id || "normal";
  snake = [{ x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2) }];
  for (var i = 1; i < 4; i++) snake.push({ x: snake[0].x - i, y: snake[0].y });
  dir = { x: 1, y: 0 }; nextDir = { x: 1, y: 0 }; dirQueue = [];
  score = 0; combo = 0; comboTimer = 0; maxCombo = 0;
  nitro = false; nitroFuel = 100; bulletTime = 0; nearMiss = false;
  baseSpeed = (diffId === "easy" ? 0.2 : diffId === "normal" ? 0.17 : diffId === "hard" ? 0.14 : 0.11) / speedScale;
  moveTimer = 0; moveProgress = 0; gameEnded = false; animT = 0; intensity = 0;
  floaters = []; pulseRings = []; afterImages = []; scorePopFlash = 0;
  wallPulse = 0; comboFlash = 0;
  foods = []; running = true; keys = {};
  spawnObstacles(); ensureFoods();
  attachControls();
  updateHud();
  lastTs = performance.now();
  animId = requestAnimationFrame(loop);
}

var lastTs = 0;

function updateHud() {
  var diff = shell.getDifficulty();
  var mult = (1 + combo * 0.5).toFixed(1);
  var btHtml = bulletTime > 0 ? '<div><span>????</span><b style="color:#f472b6">ON</b></div>' : '';
  var comboHtml = combo > 0 ? '<div><span>??</span><b style="color:#fbbf24">x' + combo + '</b></div>' : '';
  shell.setHud(
    '<div><span>??</span><b>' + score.toLocaleString() + '</b></div>' +
    '<div><span>??</span><b style="color:#22d3ee">x' + mult + '</b></div>' +
    '<div><span>??</span><b style="color:' + (nitro ? '#f472b6' : '#e2e8f0') + '">' + Math.floor(nitroFuel) + '%</b></div>' +
    '<div><span>??</span><b>' + snake.length + '</b></div>' +
    '<div><span>??</span><b style="font-size:.78rem;color:#c4b5fd">' + diff.label + '</b></div>' +
    comboHtml + btHtml
  );
}

function die() {
  if (gameEnded) return;
  gameEnded = true; running = false;
  shell.triggerShake(14, 0.45);
  var hx = snake[0].x * GRID + GRID / 2, hy = snake[0].y * GRID + GRID / 2;
  particles.burst(hx, hy, "#f472b6", 36);
  particles.burst(hx, hy, "#22d3ee", 18);
  RNF.sfx.die();
  cleanup();
  shell.gameOver(score, { combo: maxCombo, length: snake.length });
}

function eatFood(f, head) {
  var cfg = FOOD_CFG[f.type] || FOOD_CFG.normal;
  combo++; maxCombo = Math.max(maxCombo, combo);
  comboTimer = f.type === "combo" ? 6.5 : 4.2;
  comboFlash = 0.35; scorePopFlash = 0.25;
  intensity = Math.min(1, intensity + 0.08);
  var mult = 1 + combo * 0.5;
  var pts = Math.floor((f.type === "star" ? 30 : cfg.pts) * mult);
  if (f.type === "ghost") {
    pts = Math.floor(22 * mult);
    bulletTime = Math.max(bulletTime, 0.8);
    addFloater(head.x * GRID + GRID / 2, head.y * GRID + GRID / 2 - 8, "????", "#94a3b8");
  }
  score += pts;
  var px = head.x * GRID + GRID / 2, py = head.y * GRID + GRID / 2;
  addFloater(px, py - 8, "+" + pts + (combo > 1 ? " x" + combo : ""), cfg.color);
  addPulseRing(px, py, cfg.glow);
  particles.burst(px, py, cfg.glow, f.type === "star" ? 28 : 16);
  if (f.type === "star") particles.burst(px, py, "#fff", 10);
  RNF.sfx.combo(combo);
  shell.triggerShake(f.type === "star" ? 6 : 3, 0.12);
  if (f.type === "nitro") { nitroFuel = Math.min(100, nitroFuel + 45); addFloater(px, py + 12, "?? +45", "#f472b6"); }
  if (f.type === "shrink" && snake.length > 5) {
    var cut = Math.min(3, snake.length - 4);
    for (var i = 0; i < cut; i++) snake.pop();
    addFloater(px, py + 12, "?? -" + cut, "#a78bfa");
  }
  baseSpeed = Math.max(0.045, baseSpeed - (0.0022 + Math.min(0.002, combo * 0.00015)));
  foods = foods.filter(function (item) { return item !== f; });
  ensureFoods();
}

function stepSnake() {
  if (dirQueue.length) {
    var nd = dirQueue.shift();
    if (!(nd.x === -dir.x && nd.y === -dir.y)) nextDir = nd;
  }
  dir = { x: nextDir.x, y: nextDir.y };
  var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  if (isBlocked(head.x, head.y)) { die(); return false; }
  for (var i = 0; i < snake.length; i++) {
    if (snake[i].x === head.x && snake[i].y === head.y) { die(); return false; }
  }
  snake.unshift(head);
  var ate = null;
  for (var fi = 0; fi < foods.length; fi++) {
    if (foods[fi].x === head.x && foods[fi].y === head.y) { ate = foods[fi]; break; }
  }
  if (ate) eatFood(ate, head); else snake.pop();
  checkNearMiss();
  return true;
}

function updateObstacles(dt) {
  obstacles.forEach(function (o) {
    if (!o.moving) return;
    o.x += o.vx * dt;
    if (o.x < 1 || o.x > COLS - 2) o.vx *= -1;
  });
}

function loop(ts) {
  if (!running) return;
  var dt = Math.min(0.05, (ts - lastTs) / 1000);
  lastTs = ts; animT += dt;
  var timeScale = bulletTime > 0 ? 0.32 : 1;
  bulletTime = Math.max(0, bulletTime - dt);
  comboTimer = Math.max(0, comboTimer - dt);
  if (comboTimer <= 0 && combo > 0) { combo = Math.max(0, combo - 1); if (combo > 0) comboTimer = 1.2; }
  wallPulse = Math.max(0, wallPulse - dt * 1.8);
  comboFlash = Math.max(0, comboFlash - dt * 2.5);
  scorePopFlash = Math.max(0, scorePopFlash - dt * 3);
  intensity = Math.max(0, intensity - dt * 0.04);
  updateObstacles(dt * timeScale);

  foods.forEach(function (f) {
    f.pulse += dt * 5;
    f.spin += dt * (f.type === "star" ? 3.5 : 1.8);
    f.life += dt;
    if (f.ttl > 0) {
      f.ttl -= dt;
      if (f.ttl <= 0) {
        foods = foods.filter(function (x) { return x !== f; });
        ensureFoods();
      }
    }
  });

  nitro = (keys["ShiftLeft"] || keys["ShiftRight"]) && nitroFuel > 0;
  if (nitro) { nitroFuel = Math.max(0, nitroFuel - dt * 38); if (nitroFuel <= 0) nitro = false; }
  else nitroFuel = Math.min(100, nitroFuel + dt * 14);

  var speed = baseSpeed / (nitro ? 2.35 : 1);
  moveTimer += dt * timeScale;
  if (moveTimer > speed * 2) moveTimer = speed * 2;
  var maxSteps = 2;
  while (moveTimer >= speed && maxSteps-- > 0) {
    moveTimer -= speed;
    if (!stepSnake()) return;
  }
  moveProgress = speed > 0 ? Math.min(1, moveTimer / speed) : 0;

  floaters.forEach(function (fl) { fl.life -= dt; fl.y += fl.vy * dt; fl.vy *= 0.96; });
  floaters = floaters.filter(function (fl) { return fl.life > 0; });
  pulseRings.forEach(function (r) { r.life -= dt; r.r += dt * 90; });
  pulseRings = pulseRings.filter(function (r) { return r.life > 0; });

  var ihx = snake[0].x * GRID + GRID / 2 + dir.x * GRID * moveProgress;
  var ihy = snake[0].y * GRID + GRID / 2 + dir.y * GRID * moveProgress;
  particles.trail(ihx, ihy, nitro ? "#f472b6" : "#22d3ee");
  if (nitro && shell.isHighQuality()) {
    particles.trail(ihx, ihy, "#a78bfa");
    if (Math.random() < 0.35) {
      afterImages.push({
        segs: snake.slice(0, Math.min(8, snake.length)).map(function (s) { return { x: s.x, y: s.y }; }),
        life: 0.28, progress: moveProgress
      });
    }
  }
  afterImages.forEach(function (a) { a.life -= dt; });
  afterImages = afterImages.filter(function (a) { return a.life > 0; });
  particles.update(dt);
  draw(); updateHud();
  animId = requestAnimationFrame(loop);
}

function drawBg() {
  var g = ctx.createRadialGradient(W * 0.5, H * 0.45, 40, W * 0.5, H * 0.5, W * 0.7);
  g.addColorStop(0, bulletTime > 0 ? "#1a0a18" : "#0a1220");
  g.addColorStop(0.55, "#060a12"); g.addColorStop(1, "#030508");
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  var gridAlpha = 0.05 + Math.sin(animT * 1.2) * 0.015 + intensity * 0.04;
  ctx.strokeStyle = "rgba(34,211,238," + gridAlpha + ")";
  ctx.lineWidth = 1;
  var drift = (animT * 8) % GRID;
  for (var x = -GRID; x <= W + GRID; x += GRID) {
    ctx.beginPath(); ctx.moveTo(x + drift * 0.15, 0); ctx.lineTo(x + drift * 0.15, H); ctx.stroke();
  }
  for (var y = -GRID; y <= H + GRID; y += GRID) {
    ctx.beginPath(); ctx.moveTo(0, y + drift * 0.1); ctx.lineTo(W, y + drift * 0.1); ctx.stroke();
  }
  if (shell.isHighQuality()) {
    ctx.fillStyle = "rgba(255,255,255,0.015)";
    for (var sy = 0; sy < H; sy += 3) ctx.fillRect(0, sy, W, 1);
  }
  if (bulletTime > 0) {
    ctx.fillStyle = "rgba(244,114,182," + (0.06 + bulletTime * 0.08) + ")";
    ctx.fillRect(0, 0, W, H);
  }
  if (wallPulse > 0 || nearMiss) {
    var wa = (wallPulse > 0 ? wallPulse : 0.35) * 0.55;
    ctx.strokeStyle = "rgba(244,114,182," + wa + ")";
    ctx.lineWidth = 4; ctx.strokeRect(3, 3, W - 6, H - 6);
  }
  if (comboFlash > 0) {
    ctx.fillStyle = "rgba(251,191,36," + (comboFlash * 0.12) + ")";
    ctx.fillRect(0, 0, W, H);
  }
}

function drawObstacles() {
  obstacles.forEach(function (o) {
    var sx = o.x * GRID + 1, sy = o.y * GRID + 1, sz = GRID - 2;
    var pulse = 0.55 + Math.sin(animT * 3 + o.phase) * 0.2;
    ctx.save();
    ctx.shadowBlur = 10; ctx.shadowColor = "rgba(248,113,113," + pulse + ")";
    var grad = ctx.createLinearGradient(sx, sy, sx + sz, sy + sz);
    grad.addColorStop(0, "#4c1d24"); grad.addColorStop(0.5, "#9f1239"); grad.addColorStop(1, "#3f0a16");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(sx, sy, sz, sz, 3); ctx.fill();
    if (o.moving) {
      ctx.strokeStyle = "rgba(251,191,36,0.6)"; ctx.lineWidth = 2; ctx.stroke();
    }
    ctx.restore();
  });
}

function drawStar(cx, cy, spikes, outer, inner) {
  ctx.beginPath();
  for (var i = 0; i < spikes * 2; i++) {
    var r = i % 2 === 0 ? outer : inner;
    var a = -Math.PI / 2 + (i * Math.PI) / spikes;
    var px = cx + Math.cos(a) * r, py = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
}

function drawFoods() {
  foods.forEach(function (f) {
    var fx = f.x * GRID + GRID / 2, fy = f.y * GRID + GRID / 2;
    var cfg = FOOD_CFG[f.type] || FOOD_CFG.normal;
    var fp = Math.sin(f.pulse) * 0.18 + 0.9, r = GRID * 0.34 * fp;
    if (f.ttl > 0 && f.ttl < 4) {
      ctx.save(); ctx.globalAlpha = 0.4 + Math.sin(animT * 12) * 0.35;
      ctx.strokeStyle = "#f472b6"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(fx, fy, r * 2, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
    }
    ctx.save(); ctx.translate(fx, fy); ctx.rotate(f.spin);
    ctx.shadowBlur = 18; ctx.shadowColor = cfg.glow;
    if (f.type === "star") {
      drawStar(0, 0, 5, r * 1.15, r * 0.48);
      ctx.fillStyle = cfg.color; ctx.fill();
    } else if (f.type === "combo") {
      ctx.fillStyle = cfg.color;
      ctx.beginPath(); ctx.moveTo(0, -r); ctx.lineTo(r * 0.75, 0); ctx.lineTo(0, r); ctx.lineTo(-r * 0.75, 0); ctx.closePath(); ctx.fill();
    } else if (f.type === "nitro") {
      ctx.fillStyle = cfg.color;
      ctx.beginPath(); ctx.roundRect(-r * 0.55, -r * 0.85, r * 1.1, r * 1.7, 3); ctx.fill();
    } else if (f.type === "ghost") {
      ctx.globalAlpha = 0.55 + Math.sin(f.pulse * 2) * 0.25;
      ctx.fillStyle = cfg.color; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = cfg.color; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  });
}

function segPos(i) {
  var seg = snake[i];
  if (i === 0) {
    return { x: seg.x * GRID + GRID / 2 + dir.x * GRID * moveProgress, y: seg.y * GRID + GRID / 2 + dir.y * GRID * moveProgress };
  }
  var prev = snake[i - 1];
  return {
    x: (seg.x + (prev.x - seg.x) * moveProgress) * GRID + GRID / 2,
    y: (seg.y + (prev.y - seg.y) * moveProgress) * GRID + GRID / 2
  };
}

function drawSnake() {
  for (var i = snake.length - 1; i >= 0; i--) {
    var t = i / Math.max(1, snake.length - 1), p = segPos(i);
    var sz = GRID - 2 - t * 2; if (i === 0) sz = GRID - 1;
    var r = nitro ? Math.floor(244 - t * 80) : Math.floor(34 + t * 40);
    var g = nitro ? Math.floor(114 - t * 40) : Math.floor(211 - t * 90);
    var b = nitro ? Math.floor(182 - t * 60) : Math.floor(238 - t * 120);
    ctx.save();
    ctx.shadowBlur = i === 0 ? 18 : 6;
    ctx.shadowColor = nitro ? "#f472b6" : "#22d3ee";
    ctx.fillStyle = "rgb(" + r + "," + g + "," + b + ")";
    ctx.beginPath(); ctx.roundRect(p.x - sz / 2, p.y - sz / 2, sz, sz, i === 0 ? 6 : 4); ctx.fill();
    if (i === 0) {
      ctx.fillStyle = "#fff"; ctx.shadowBlur = 0;
      var ex = dir.x * sz * 0.18, ey = dir.y * sz * 0.18;
      var ox = -dir.y * sz * 0.22, oy = dir.x * sz * 0.22;
      ctx.beginPath();
      ctx.arc(p.x + ex + ox, p.y + ey + oy, 2.4, 0, Math.PI * 2);
      ctx.arc(p.x + ex - ox, p.y + ey - oy, 2.4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

function drawFx() {
  pulseRings.forEach(function (r) {
    ctx.save(); ctx.globalAlpha = Math.max(0, r.life / 0.45);
    ctx.strokeStyle = r.color; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
  });
  floaters.forEach(function (fl) {
    ctx.save(); ctx.globalAlpha = Math.max(0, fl.life / 0.9);
    ctx.fillStyle = fl.color; ctx.font = "bold 14px 'Segoe UI', 'Microsoft JhengHei', sans-serif";
    ctx.textAlign = "center"; ctx.fillText(fl.text, fl.x, fl.y); ctx.restore();
  });
  var barY = H - 10;
  ctx.fillStyle = "rgba(15,23,42,0.7)"; ctx.fillRect(W * 0.25, barY, W * 0.5, 5);
  var fuelW = W * 0.5 * (nitroFuel / 100);
  ctx.fillStyle = nitro ? "#f472b6" : "#22d3ee";
  ctx.fillRect(W * 0.25, barY, fuelW, 5);
  if (combo >= 3) {
    ctx.fillStyle = "#fbbf24"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("COMBO x" + combo, W / 2, 28);
  }
}

function draw() {
  ctx.save(); shell.applyShake(ctx);
  drawBg(); drawObstacles(); drawFoods(); drawSnake();
  particles.draw(ctx); drawFx(); ctx.restore();
}
</script>
