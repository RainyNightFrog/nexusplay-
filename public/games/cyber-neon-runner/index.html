var W = 960, H = 520;
var ctx, particles, running, loopId, lastT, keys = {};
var player, obstacles, coins, lasers, pickups, speed, score, dist;
var parallax, groundY, shootCd, ammo, maxAmmo, slideWanted, spawnTimer;
var speedScale = 1;
var combo, comboTimer, magnetT, shieldHits, hasteT, graceT, flashT, milestoneIdx;
var diffId, highQ, cityLights, trailBuf, nextEventAt, eventLabel, eventT;
var coyoteT, jumpBufferT, airJumps;

function cleanup() {
  shell.detachKeyboard();
  shell.detachTouchControls();
  running = false;
  if (loopId) cancelAnimationFrame(loopId);
  loopId = null;
  window.removeEventListener("keydown", onKeyDown);
  window.removeEventListener("keyup", onKeyUp);
}

function diffTuning() {
  var d = (shell.getDifficulty() || {}).id || "normal";
  var map = {
    easy: { spawnBase: 1.55, spawnFloor: 0.85, speedCap: 300, dens: 0.85, hpBonus: 0, ammo: 5, coyote: 0.12, grace: 0.45 },
    normal: { spawnBase: 1.35, spawnFloor: 0.72, speedCap: 340, dens: 1, hpBonus: 0, ammo: 4, coyote: 0.09, grace: 0.28 },
    hard: { spawnBase: 1.15, spawnFloor: 0.58, speedCap: 390, dens: 1.15, hpBonus: 1, ammo: 3, coyote: 0.06, grace: 0.16 },
    extreme: { spawnBase: 0.95, spawnFloor: 0.45, speedCap: 450, dens: 1.35, hpBonus: 1, ammo: 2, coyote: 0.04, grace: 0.08 }
  };
  return map[d] || map.normal;
}

function startGame() {
  cleanup();
  speedScale = shell.getSpeedScale();
  ctx = shell.ctx;
  particles = shell.particles;
  highQ = shell.isHighQuality();
  diffId = (shell.getDifficulty() || {}).id || "normal";
  var tun = diffTuning();
  groundY = 420;
  player = {
    x: 130, y: groundY - 48, w: 34, h: 48, vy: 0,
    onGround: true, sliding: false, standH: 48, slideH: 22
  };
  obstacles = []; coins = []; lasers = []; pickups = [];
  speed = 185 * speedScale;
  score = 0; dist = 0; shootCd = 0; slideWanted = false;
  maxAmmo = tun.ammo; ammo = maxAmmo;
  combo = 0; comboTimer = 0; magnetT = 0; shieldHits = 0; hasteT = 0;
  graceT = tun.grace; flashT = 0; milestoneIdx = 0;
  coyoteT = 0; jumpBufferT = 0; airJumps = 1;
  spawnTimer = 0.4;
  nextEventAt = 400; eventLabel = ""; eventT = 0;
  trailBuf = [];
  parallax = [
    { color: "rgba(34,211,238,0.07)", spd: 0.15, h: 100, blocks: [] },
    { color: "rgba(167,139,250,0.1)", spd: 0.35, h: 160, blocks: [] },
    { color: "rgba(244,114,182,0.12)", spd: 0.55, h: 230, blocks: [] },
    { color: "rgba(56,189,248,0.14)", spd: 0.8, h: 300, blocks: [] }
  ];
  parallax.forEach(function (l, li) {
    for (var i = 0; i < 14; i++) {
      l.blocks.push({
        x: i * 110 + Math.random() * 30,
        w: 28 + Math.random() * (50 + li * 8),
        h: 30 + Math.random() * (70 + li * 20),
        glow: Math.random()
      });
    }
  });
  cityLights = [];
  for (var i = 0; i < (highQ ? 40 : 16); i++) {
    cityLights.push({
      x: Math.random() * W,
      y: 80 + Math.random() * 220,
      s: 0.8 + Math.random() * 1.6,
      a: 0.2 + Math.random() * 0.6,
      spd: 0.1 + Math.random() * 0.25
    });
  }
  updateHud();
  running = true;
  keys = {};
  shell.attachKeyboard(keys);
  shell.attachTouchControls({
    keys: keys,
    forceVisible: false,
    buttons: [
      { code: "Space", label: "žő", side: "left", hold: false, onPress: function () { tryJump(true); } },
      { code: "ArrowDown", label: "·Æ", side: "right", hold: true, wide: true,
        onPress: function () { slideWanted = true; startSlide(); },
        onRelease: function () { slideWanted = false; endSlide(); }
      },
      { code: "KeyZ", label: "źg", side: "right", hold: false, danger: true, onPress: function () { tryShoot(); } }
    ],
    swipe: {
      threshold: 40,
      up: function () { tryJump(true); },
      down: function () {
        slideWanted = true;
        startSlide();
        setTimeout(function () { slideWanted = false; endSlide(); }, 520);
      },
      tap: function () { tryJump(true); }
    }
  });
  lastT = performance.now();
  window.addEventListener("keydown", onKeyDown);
  window.addEventListener("keyup", onKeyUp);
  loopId = requestAnimationFrame(loop);
}

function tryJump(fromInput) {
  if (!running || !player) return;
  if (fromInput) jumpBufferT = 0.12;
  var canCoyote = coyoteT > 0 && player.vy >= 0;
  if ((player.onGround || canCoyote) && !player.sliding) {
    player.vy = -455;
    player.onGround = false;
    coyoteT = 0;
    jumpBufferT = 0;
    airJumps = 1;
    RNF.sfx.power();
    if (highQ) particles.burst(player.x + player.w / 2, player.y + player.h, "#22d3ee", 8);
    return;
  }
  if (!player.onGround && airJumps > 0 && jumpBufferT > 0) {
    airJumps -= 1;
    jumpBufferT = 0;
    player.vy = -340;
    RNF.sfx.power();
    if (highQ) particles.burst(player.x + player.w / 2, player.y + player.h / 2, "#a78bfa", 10);
  }
}

function startSlide() {
  if (!player || !player.onGround) return;
  player.sliding = true;
  player.h = player.slideH;
  player.y = groundY - player.h;
}

function endSlide() {
  if (!player || !player.sliding) return;
  if (keys["ArrowDown"] || keys["KeyS"] || slideWanted) return;
  player.sliding = false;
  player.h = player.standH;
  player.y = groundY - player.h;
}

function tryShoot() {
  if (!running || shootCd > 0 || ammo <= 0) return;
  shootCd = 0.38;
  ammo -= 1;
  lasers.push({
    x: player.x + player.w,
    y: player.y + player.h * 0.35,
    vx: 680,
    w: 32,
    h: 5,
    life: 0.9
  });
  RNF.sfx.laser();
  shell.triggerShake(2, 0.05);
  if (highQ) particles.burst(player.x + player.w, player.y + player.h * 0.35, "#67e8f9", 6);
}

function onKeyDown(e) {
  if (!running) return;
  keys[e.code] = true;
  if (e.code === "Space" || e.code === "KeyW" || e.code === "ArrowUp") {
    e.preventDefault();
    tryJump(true);
  }
  if (e.code === "ArrowDown" || e.code === "KeyS") {
    e.preventDefault();
    slideWanted = true;
    startSlide();
  }
  if (e.code === "KeyZ") {
    e.preventDefault();
    tryShoot();
  }
}

function onKeyUp(e) {
  keys[e.code] = false;
  if (e.code === "ArrowDown" || e.code === "KeyS") {
    slideWanted = false;
    endSlide();
  }
}

function rollObstacleType(progress) {
  var r = Math.random();
  var dens = diffTuning().dens;
  if (progress > 0.35 && r < 0.14 * dens) return "gate";
  if (progress > 0.2 && r < 0.28) return "drone";
  if (progress > 0.45 && r < 0.18) return "mover";
  if (r < 0.42) return "low";
  return "wall";
}

function spawnWave() {
  var tun = diffTuning();
  var progress = Math.min(1, dist / 2500);
  var type = rollObstacleType(progress);
  var x = W + 40;
  if (type === "low") {
    obstacles.push({ type: "low", x: x, y: groundY - 34, w: 36, h: 34, hp: 1, breakable: true, color: "#a78bfa" });
  } else if (type === "wall") {
    var wh = 70 + Math.random() * 40;
    obstacles.push({ type: "wall", x: x, y: groundY - wh, w: 30, h: wh, hp: 1 + tun.hpBonus, breakable: true, color: "#c084fc" });
  } else if (type === "drone") {
    obstacles.push({
      type: "drone", x: x, y: groundY - 130 - Math.random() * 90, w: 38, h: 26,
      hp: 1, breakable: true, color: "#f472b6", bob: Math.random() * 8, baseY: 0
    });
    obstacles[obstacles.length - 1].baseY = obstacles[obstacles.length - 1].y;
  } else if (type === "gate") {
    obstacles.push({
      type: "gate", x: x, y: groundY - 118, w: 18, h: 96, hp: 999, breakable: false, color: "#f43f5e", pulse: 0
    });
  } else if (type === "mover") {
    obstacles.push({
      type: "mover", x: x, y: groundY - 55, w: 44, h: 22, hp: 1, breakable: true, color: "#38bdf8",
      phase: Math.random() * Math.PI * 2, amp: 40 + Math.random() * 35
    });
  }

  if (Math.random() < 0.55) {
    var cy = groundY - 55 - Math.random() * 130;
    for (var i = 0; i < 3; i++) {
      coins.push({ x: x + 50 + i * 28, y: cy - Math.sin(i) * 12, r: 9, taken: false });
    }
  }
  if (Math.random() < 0.12 + progress * 0.08) {
    var kinds = ["shield", "magnet", "haste", "ammo"];
    var kind = kinds[Math.floor(Math.random() * kinds.length)];
    pickups.push({
      kind: kind, x: x + 90, y: groundY - 90 - Math.random() * 100,
      r: 14, taken: false
    });
  }
}

function triggerMilestone() {
  var labels = ["ÀO­ičLžü", "«ŃŸÔŹđĆ§", "·„łtŻèčD", "Ÿ€©úœÄšë"];
  eventLabel = labels[milestoneIdx % labels.length];
  eventT = 2.4;
  flashT = 0.45;
  score += 150 + milestoneIdx * 80;
  ammo = Math.min(maxAmmo, ammo + 2);
  RNF.sfx.score();
  shell.triggerShake(6, 0.18);
  if (highQ) {
    for (var i = 0; i < 3; i++) {
      particles.burst(200 + i * 200, groundY - 80, "#fbbf24", 16);
    }
  }
  milestoneIdx += 1;
  nextEventAt += 450 + milestoneIdx * 80;
  // burst denser obstacles briefly
  for (var j = 0; j < 2; j++) setTimeout(spawnWave, j * 180);
}

function takeDamage() {
  if (!running || graceT > 0) return;
  if (shieldHits > 0) {
    shieldHits -= 1;
    graceT = 0.7;
    RNF.sfx.hit();
    shell.triggerShake(8, 0.2);
    particles.burst(player.x + player.w / 2, player.y + player.h / 2, "#67e8f9", 18);
    return;
  }
  running = false;
  RNF.sfx.die();
  shell.triggerShake(14, 0.4);
  particles.burst(player.x + player.w / 2, player.y + player.h / 2, "#f472b6", 28);
  shell.gameOver(Math.floor(score), {
    distance: Math.floor(dist),
    combo: combo,
    difficulty: diffId
  });
}

function pickupKind(kind) {
  if (kind === "shield") { shieldHits = Math.min(2, shieldHits + 1); RNF.sfx.power(); }
  else if (kind === "magnet") { magnetT = Math.max(magnetT, 6); RNF.sfx.power(); }
  else if (kind === "haste") { hasteT = Math.max(hasteT, 4.5); RNF.sfx.power(); }
  else if (kind === "ammo") { ammo = Math.min(maxAmmo, ammo + 2); RNF.sfx.score(); }
  score += 40;
  if (highQ) particles.burst(player.x, player.y, "#4ade80", 12);
}

function rectHit(a, b, pad) {
  pad = pad || 0;
  return a.x + a.w > b.x + pad && a.x < b.x + b.w - pad &&
    a.y + a.h > b.y + pad && a.y < b.y + b.h - pad;
}

function updateHud() {
  var mult = 1 + Math.min(4, Math.floor(combo / 5)) * 0.25;
  var buffs = [];
  if (shieldHits > 0) buffs.push("ŹȚĄŃ" + shieldHits);
  if (magnetT > 0) buffs.push("șÏ");
  if (hasteT > 0) buffs.push("łt");
  shell.setHud(
    '<div><span>€ÀŒÆ</span><b>' + Math.floor(score).toLocaleString() + '</b></div>' +
    '<div><span>¶ZÂś</span><b>' + Math.floor(dist) + 'm</b></div>' +
    '<div><span>Combo</span><b>ĄŃ' + mult.toFixed(2).replace(/\.00$/, "") + ' (' + combo + ')</b></div>' +
    '<div><span>ŒuĂÄ</span><b>' + ammo + '/' + maxAmmo + '</b></div>' +
    '<div><span>ȘŹșA</span><b>' + (buffs.length ? buffs.join(" ") : (player && player.sliding ? "·ÆŠæ" : player && player.onGround ? "©b¶]" : "žőĆD")) + '</b></div>'
  );
}

function loop(now) {
  if (!running) return;
  var dt = Math.min(0.032, (now - lastT) / 1000);
  lastT = now;
  var tun = diffTuning();
  var hasteMul = hasteT > 0 ? 1.28 : 1;
  var worldSpd = speed * hasteMul;

  dist += worldSpd * dt * 0.12;
  var baseGain = worldSpd * dt * 0.055;
  var mult = 1 + Math.min(4, Math.floor(combo / 5)) * 0.25;
  score += baseGain * mult;
  speed = Math.min(tun.speedCap * speedScale, 185 * speedScale + dist * 0.042);
  shootCd = Math.max(0, shootCd - dt);
  magnetT = Math.max(0, magnetT - dt);
  hasteT = Math.max(0, hasteT - dt);
  graceT = Math.max(0, graceT - dt);
  flashT = Math.max(0, flashT - dt);
  eventT = Math.max(0, eventT - dt);
  comboTimer = Math.max(0, comboTimer - dt);
  if (comboTimer <= 0) combo = 0;
  coyoteT = Math.max(0, coyoteT - dt);
  jumpBufferT = Math.max(0, jumpBufferT - dt);

  if (dist >= nextEventAt) triggerMilestone();

  // jump buffer consume
  if (jumpBufferT > 0) tryJump(false);

  if ((keys["ArrowDown"] || keys["KeyS"] || slideWanted) && player.onGround) startSlide();
  else if (player.sliding) endSlide();

  var wasGround = player.onGround;
  player.vy += 1180 * dt;
  if (player.vy > 820) player.vy = 820;
  player.y += player.vy * dt;
  if (player.y + player.h >= groundY) {
    player.y = groundY - player.h;
    player.vy = 0;
    player.onGround = true;
    if (!wasGround && highQ) particles.burst(player.x + player.w / 2, groundY, "#22d3ee", 4);
  } else {
    if (wasGround) coyoteT = tun.coyote;
    player.onGround = false;
  }

  spawnTimer -= dt;
  var spawnGap = Math.max(tun.spawnFloor, tun.spawnBase - dist * 0.00035) / tun.dens;
  if (spawnTimer <= 0) {
    spawnTimer = spawnGap * (0.85 + Math.random() * 0.35);
    spawnWave();
  }

  // ammo regen slowly
  if (ammo < maxAmmo) {
    player._ammoAcc = (player._ammoAcc || 0) + dt;
    if (player._ammoAcc > 3.2) {
      player._ammoAcc = 0;
      ammo += 1;
    }
  }

  parallax.forEach(function (l) {
    l.blocks.forEach(function (b) {
      b.x -= worldSpd * l.spd * dt;
      if (b.x + b.w < -20) {
        b.x += 1200 + Math.random() * 80;
        b.h = 30 + Math.random() * 100;
        b.w = 28 + Math.random() * 70;
      }
    });
  });
  cityLights.forEach(function (L) {
    L.x -= worldSpd * L.spd * dt;
    if (L.x < -4) L.x = W + Math.random() * 40;
  });

  obstacles.forEach(function (o) {
    o.x -= worldSpd * dt;
    if (o.type === "drone") {
      o.y = o.baseY + Math.sin(now * 0.004 + o.bob) * 18;
    } else if (o.type === "mover") {
      o.y = groundY - 55 - Math.sin(now * 0.003 + o.phase) * o.amp;
    } else if (o.type === "gate") {
      o.pulse = (o.pulse || 0) + dt * 6;
    }
  });

  coins.forEach(function (c) {
    c.x -= worldSpd * dt;
    if (magnetT > 0) {
      var px = player.x + player.w / 2;
      var py = player.y + player.h / 2;
      var dx = px - c.x, dy = py - c.y;
      var distP = Math.sqrt(dx * dx + dy * dy) || 1;
      if (distP < 160) {
        c.x += (dx / distP) * 320 * dt;
        c.y += (dy / distP) * 320 * dt;
      }
    }
  });

  pickups.forEach(function (p) {
    p.x -= worldSpd * dt;
    p.y += Math.sin(now * 0.005 + p.x * 0.01) * 0.3;
  });

  lasers.forEach(function (l) {
    l.x += l.vx * dt;
    l.life -= dt;
  });

  // laser vs obstacles
  for (var li = lasers.length - 1; li >= 0; li--) {
    var l = lasers[li];
    for (var oi = obstacles.length - 1; oi >= 0; oi--) {
      var o = obstacles[oi];
      if (!o.breakable) continue;
      if (l.x < o.x + o.w && l.x + l.w > o.x && l.y < o.y + o.h && l.y + l.h > o.y) {
        o.hp -= 1;
        lasers.splice(li, 1);
        if (o.hp <= 0) {
          score += 60 * mult;
          RNF.sfx.hit();
          shell.triggerShake(4, 0.1);
          particles.burst(o.x + o.w / 2, o.y + o.h / 2, "#4ade80", 14);
          obstacles.splice(oi, 1);
        } else {
          RNF.sfx.hit();
          particles.burst(o.x + o.w / 2, o.y + o.h / 2, "#fbbf24", 6);
        }
        break;
      }
    }
  }
  lasers = lasers.filter(function (l) { return l.x < W + 40 && l.life > 0; });
  obstacles = obstacles.filter(function (o) { return o.x > -100; });

  // player collision
  var hitBox = {
    x: player.x + 6,
    y: player.y + (player.sliding ? 2 : 4),
    w: player.w - 12,
    h: player.h - (player.sliding ? 4 : 8)
  };
  obstacles.forEach(function (o) {
    if (o.type === "gate") {
      // must slide under (gate hangs from above) ĄX collision if not sliding enough
      var gatePad = player.sliding ? 0 : 4;
      if (rectHit(hitBox, o, gatePad)) takeDamage();
      return;
    }
    if (rectHit(hitBox, o, 5)) takeDamage();
  });

  coins.forEach(function (c) {
    if (c.taken) return;
    var px = player.x + player.w / 2;
    var py = player.y + player.h / 2;
    if (Math.abs(c.x - px) < 22 && Math.abs(c.y - py) < 26) {
      c.taken = true;
      combo += 1;
      comboTimer = 2.4;
      score += 22 * mult;
      RNF.sfx.score();
      if (highQ) particles.burst(c.x, c.y, "#fbbf24", 7);
    }
  });
  coins = coins.filter(function (c) { return !c.taken && c.x > -30; });

  pickups.forEach(function (p) {
    if (p.taken) return;
    var px = player.x + player.w / 2;
    var py = player.y + player.h / 2;
    if (Math.abs(p.x - px) < 26 && Math.abs(p.y - py) < 28) {
      p.taken = true;
      pickupKind(p.kind);
    }
  });
  pickups = pickups.filter(function (p) { return !p.taken && p.x > -30; });

  if (highQ) {
    trailBuf.push({ x: player.x + 8, y: player.y + player.h / 2, life: 0.28 });
    if (trailBuf.length > 18) trailBuf.shift();
    particles.trail(player.x + player.w / 2, player.y + player.h / 2, hasteT > 0 ? "#fbbf24" : "#22d3ee");
  }
  trailBuf.forEach(function (t) { t.life -= dt; });
  trailBuf = trailBuf.filter(function (t) { return t.life > 0; });

  particles.update(dt);
  draw(now);
  updateHud();
  loopId = requestAnimationFrame(loop);
}

function drawRunner(x, y, w, h, sliding) {
  ctx.save();
  ctx.translate(x, y);
  var bodyH = h;
  var col = hasteT > 0 ? "#fbbf24" : (shieldHits > 0 ? "#67e8f9" : "#22d3ee");
  ctx.fillStyle = col;
  ctx.shadowBlur = highQ ? 18 : 6;
  ctx.shadowColor = col;
  // torso
  ctx.beginPath();
  if (sliding) {
    ctx.roundRect ? ctx.roundRect(2, 4, w - 4, bodyH - 6, 6) : ctx.rect(2, 4, w - 4, bodyH - 6);
  } else {
    ctx.roundRect ? ctx.roundRect(4, 2, w - 10, bodyH - 10, 8) : ctx.rect(4, 2, w - 10, bodyH - 10);
  }
  ctx.fill();
  // head
  if (!sliding) {
    ctx.fillStyle = "#e2e8f0";
    ctx.beginPath();
    ctx.arc(w * 0.62, 12, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#0ea5e9";
    ctx.fillRect(w * 0.62 + 1, 10, 5, 3);
  } else {
    ctx.fillStyle = "#e2e8f0";
    ctx.fillRect(w - 14, 6, 10, 8);
  }
  // legs suggestion
  if (!sliding) {
    var leg = (Math.floor(dist / 8) % 2) ? 1 : -1;
    ctx.strokeStyle = col;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(10, bodyH - 10);
    ctx.lineTo(10 + leg * 6, bodyH);
    ctx.moveTo(18, bodyH - 10);
    ctx.lineTo(18 - leg * 6, bodyH);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

function draw(now) {
  ctx.save();
  shell.applyShake(ctx);

  var sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, "#07041a");
  sky.addColorStop(0.45, "#12082e");
  sky.addColorStop(1, "#05070f");
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  if (flashT > 0) {
    ctx.fillStyle = "rgba(251,191,36," + (flashT * 0.35) + ")";
    ctx.fillRect(0, 0, W, H);
  }

  // distant stars / lights
  cityLights.forEach(function (L) {
    ctx.globalAlpha = L.a * (0.6 + 0.4 * Math.sin(now * 0.003 + L.x));
    ctx.fillStyle = "#a5f3fc";
    ctx.fillRect(L.x, L.y, L.s, L.s);
  });
  ctx.globalAlpha = 1;

  parallax.forEach(function (l, li) {
    ctx.fillStyle = l.color;
    l.blocks.forEach(function (b) {
      var by = groundY - l.h - b.h * 0.25;
      ctx.fillRect(b.x, by, b.w, b.h);
      if (highQ && b.glow > 0.7) {
        ctx.fillStyle = "rgba(34,211,238,0.15)";
        ctx.fillRect(b.x + 4, by + 8, 4, 4);
        ctx.fillStyle = l.color;
      }
    });
    ctx.fillStyle = "rgba(34,211,238," + (0.04 + li * 0.02) + ")";
    ctx.fillRect(0, groundY - 6 - li * 5, W, 2);
  });

  // ground
  var ggrad = ctx.createLinearGradient(0, groundY, 0, H);
  ggrad.addColorStop(0, "#141c2e");
  ggrad.addColorStop(1, "#070a12");
  ctx.fillStyle = ggrad;
  ctx.fillRect(0, groundY, W, H - groundY);
  ctx.strokeStyle = "#22d3ee";
  ctx.shadowBlur = highQ ? 12 : 0;
  ctx.shadowColor = "#22d3ee";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.lineWidth = 1;
  for (var gx = -((dist * 3.2) % 56); gx < W; gx += 56) {
    ctx.strokeStyle = "rgba(34,211,238,0.12)";
    ctx.beginPath();
    ctx.moveTo(gx, groundY);
    ctx.lineTo(gx - 28, H);
    ctx.stroke();
  }

  // trails
  trailBuf.forEach(function (t) {
    ctx.globalAlpha = Math.max(0, t.life / 0.28) * 0.35;
    ctx.fillStyle = "#22d3ee";
    ctx.fillRect(t.x, t.y - 4, 10, 8);
  });
  ctx.globalAlpha = 1;

  coins.forEach(function (c) {
    if (c.taken) return;
    ctx.fillStyle = "#fbbf24";
    ctx.shadowBlur = highQ ? 14 : 4;
    ctx.shadowColor = "#fbbf24";
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#fff7ed";
    ctx.font = "bold 9px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("?", c.x, c.y + 3);
  });
  ctx.shadowBlur = 0;

  pickups.forEach(function (p) {
    if (p.taken) return;
    var col = p.kind === "shield" ? "#67e8f9" : p.kind === "magnet" ? "#c084fc" : p.kind === "haste" ? "#fbbf24" : "#4ade80";
    ctx.fillStyle = col;
    ctx.shadowBlur = highQ ? 16 : 4;
    ctx.shadowColor = col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#0f172a";
    ctx.font = "bold 10px sans-serif";
    ctx.textAlign = "center";
    var label = p.kind === "shield" ? "ŹȚ" : p.kind === "magnet" ? "șÏ" : p.kind === "haste" ? "łt" : "Œu";
    ctx.fillText(label, p.x, p.y + 4);
  });
  ctx.shadowBlur = 0;

  obstacles.forEach(function (o) {
    ctx.save();
    if (o.type === "gate") {
      var pulse = 0.55 + 0.45 * Math.sin(o.pulse || 0);
      ctx.strokeStyle = "rgba(244,63,94," + pulse + ")";
      ctx.fillStyle = "rgba(244,63,94,0.25)";
      ctx.shadowBlur = highQ ? 20 : 6;
      ctx.shadowColor = "#f43f5e";
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.strokeRect(o.x, o.y, o.w, o.h);
      ctx.fillStyle = "#fda4af";
      ctx.font = "9px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("GATE", o.x + o.w / 2, o.y - 6);
      ctx.fillText("·ÆŠæ", o.x + o.w / 2, o.y + o.h + 12);
    } else if (o.type === "drone") {
      ctx.fillStyle = o.color;
      ctx.shadowBlur = highQ ? 14 : 4;
      ctx.shadowColor = o.color;
      ctx.beginPath();
      ctx.ellipse(o.x + o.w / 2, o.y + o.h / 2, o.w / 2, o.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#22d3ee";
      ctx.fillRect(o.x + 6, o.y + o.h / 2 - 2, o.w - 12, 4);
    } else {
      ctx.fillStyle = o.color;
      ctx.shadowBlur = highQ ? 12 : 4;
      ctx.shadowColor = o.color;
      ctx.fillRect(o.x, o.y, o.w, o.h);
      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.strokeRect(o.x + 1, o.y + 1, o.w - 2, o.h - 2);
      if (o.hp > 1) {
        ctx.fillStyle = "#fff";
        ctx.font = "bold 10px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(String(o.hp), o.x + o.w / 2, o.y + o.h / 2 + 3);
      }
    }
    ctx.restore();
  });
  ctx.shadowBlur = 0;

  lasers.forEach(function (l) {
    ctx.fillStyle = "#67e8f9";
    ctx.shadowBlur = highQ ? 18 : 6;
    ctx.shadowColor = "#22d3ee";
    ctx.fillRect(l.x, l.y, l.w, l.h);
    ctx.fillStyle = "#fff";
    ctx.fillRect(l.x + l.w - 6, l.y + 1, 6, l.h - 2);
  });
  ctx.shadowBlur = 0;

  if (graceT > 0 && Math.floor(now / 60) % 2 === 0) ctx.globalAlpha = 0.45;
  drawRunner(player.x, player.y, player.w, player.h, player.sliding);
  ctx.globalAlpha = 1;

  // shield ring
  if (shieldHits > 0) {
    ctx.strokeStyle = "rgba(103,232,249,0.7)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(player.x + player.w / 2, player.y + player.h / 2, player.w * 0.85, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
  }

  if (eventT > 0) {
    ctx.fillStyle = "rgba(0,0,0,0.35)";
    ctx.fillRect(W / 2 - 120, 48, 240, 36);
    ctx.fillStyle = "#fbbf24";
    ctx.font = "bold 16px 'Microsoft JhengHei',sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(eventLabel, W / 2, 72);
  }

  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ctx.fillRect(0, 0, W, 34);
  ctx.fillStyle = "#a78bfa";
  ctx.font = "12px 'Microsoft JhengHei',sans-serif";
  ctx.textAlign = "left";
  ctx.fillText("NightCity ĄP ÁÉłŐÀO­i”LșÉ¶]»Ć", 14, 22);
  ctx.textAlign = "right";
  ctx.fillStyle = "#67e8f9";
  ctx.fillText((shell.getDifficulty() || {}).label || diffId, W - 14, 22);

  particles.draw(ctx);
  ctx.restore();
}
</script>
