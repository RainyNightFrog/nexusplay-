<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rainy Frog Dash · 雨夜青蛙衝刺</title>
  <script src="/sdk/rnf-game-sdk.js"></script>
</head>
<body>
<script>
RNF.init();
var shell = RNF.buildShell({
  title: "Rainy Frog Dash",
  creator: "FroggyLab_Games",
  subtitle: "空白鍵跳躍（可二段跳）· 長按滑翔 · Z 護盾 · 收集火箭加速 · 避開霓虹障礙",
  width: 960,
  height: 520,
  bgmStyle: "ambient",
  onStart: startGame
});

var W = shell.width, H = shell.height;
var ctx = shell.ctx;
var particles = shell.particles;
var animId = null, running = false, gameEnded = false, keys = {};
var frog, obstacles, pickups, rain, score, speed, jumps, shield, rocketTimer;
var groundY = H - 80, scrollX = 0;

function cleanup() {
  running = false;
  if (animId) cancelAnimationFrame(animId);
  animId = null;
  window.removeEventListener("keydown", onKey);
  window.removeEventListener("keyup", onKeyUp);
}

function onKey(e) {
  keys[e.code] = true;
  if (e.code === "Space" && !e.repeat) {
    e.preventDefault();
    if (!frog.onGround && jumps < 2) {
      frog.vy = -11;
      jumps++;
      RNF.sfx.confirm();
      particles.burst(frog.x, frog.y + 15, "#34d399", 8);
    } else if (frog.onGround) {
      frog.vy = -13;
      jumps = 1;
      RNF.sfx.click();
    }
  }
  if (e.code === "KeyZ" && shield <= 0) {
    shield = 3;
    RNF.sfx.power();
    shell.triggerShake(3, 0.1);
  }
}
function onKeyUp(e) { keys[e.code] = false; }

function initRain() {
  rain = [];
  for (var i = 0; i < 120; i++) {
    rain.push({ x: Math.random() * W, y: Math.random() * H, len: 8 + Math.random() * 14, sp: 8 + Math.random() * 12 });
  }
}

function spawnObstacle() {
  var type = Math.random() < 0.3 ? "fly" : "pipe";
  obstacles.push({
    type: type,
    x: W + 40 + Math.random() * 80,
    y: type === "fly" ? groundY - 80 - Math.random() * 120 : groundY - 40 - Math.random() * 60,
    w: type === "fly" ? 50 : 30 + Math.random() * 20,
    h: type === "fly" ? 40 : 80 + Math.random() * 100,
    passed: false
  });
}

function spawnPickup() {
  if (Math.random() < 0.35) {
    pickups.push({
      type: Math.random() < 0.25 ? "rocket" : "coin",
      x: W + 60,
      y: groundY - 60 - Math.random() * 180,
      r: 14
    });
  }
}

function startGame() {
  cleanup();
  frog = { x: 160, y: groundY - 30, vy: 0, r: 22, onGround: false, wingT: 0 };
  obstacles = [];
  pickups = [];
  score = 0;
  speed = 4;
  jumps = 0;
  shield = 0;
  rocketTimer = 0;
  scrollX = 0;
  gameEnded = false;
  initRain();
  spawnTimer = 0;
  pickupTimer = 0;
  running = true;
  window.addEventListener("keydown", onKey);
  window.addEventListener("keyup", onKeyUp);
  lastTs = performance.now();
  animId = requestAnimationFrame(loop);
}

var lastTs = 0, spawnTimer = 0, pickupTimer = 0;

function die() {
  if (gameEnded) return;
  gameEnded = true;
  running = false;
  RNF.sfx.die();
  shell.triggerShake(14, 0.45);
  particles.burst(frog.x, frog.y, "#f472b6", 35);
  cleanup();
  shell.gameOver(score, { distance: Math.floor(scrollX) });
}

function updateHud() {
  shell.setHud(
    '<div><span>分數</span><b>' + score + '</b></div>' +
    '<div><span>距離</span><b>' + Math.floor(scrollX) + 'm</b></div>' +
    '<div><span>護盾</span><b>' + (shield > 0 ? shield : '-') + '</b></div>' +
    (rocketTimer > 0 ? '<div><span>火箭</span><b style="color:#fbbf24">BOOST</b></div>' : '')
  );
}

function loop(ts) {
  if (!running) return;
  var dt = Math.min(0.05, (ts - lastTs) / 1000);
  lastTs = ts;

  var curSpeed = speed + (rocketTimer > 0 ? 5 : 0) + scrollX * 0.001;
  scrollX += curSpeed * dt * 10;
  score += Math.floor(curSpeed * dt * 2);

  frog.vy += 0.55;
  if (keys["Space"] && frog.vy > 0 && !frog.onGround) frog.vy *= 0.96;
  frog.y += frog.vy;
  frog.wingT += dt * 8;

  if (frog.y + frog.r >= groundY) {
    frog.y = groundY - frog.r;
    frog.vy = 0;
    frog.onGround = true;
    jumps = 0;
  } else {
    frog.onGround = false;
  }

  rocketTimer = Math.max(0, rocketTimer - dt);
  if (shield > 0 && Math.random() < 0.3) {
    particles.trail(frog.x + (Math.random()-0.5)*30, frog.y + (Math.random()-0.5)*30, "#a78bfa");
  }

  spawnTimer += dt;
  if (spawnTimer > Math.max(0.8, 1.8 - scrollX * 0.0003)) {
    spawnObstacle();
    spawnTimer = 0;
  }
  pickupTimer += dt;
  if (pickupTimer > 2) { spawnPickup(); pickupTimer = 0; }

  obstacles.forEach(function (o) {
    o.x -= curSpeed;
    if (!o.passed && o.x + o.w < frog.x) {
      o.passed = true;
      score += 5;
      RNF.sfx.pop();
    }
    if (rectCircle(o.x, o.y, o.w, o.h, frog.x, frog.y, frog.r)) {
      if (shield > 0) {
        shield--;
        o.x = -999;
        RNF.sfx.hit();
        shell.triggerShake(4, 0.15);
        particles.burst(frog.x, frog.y, "#a78bfa", 20);
      } else {
        die();
        return;
      }
    }
  });
  obstacles = obstacles.filter(function (o) { return o.x > -100; });

  pickups.forEach(function (p) {
    p.x -= curSpeed;
    if (Math.hypot(p.x - frog.x, p.y - frog.y) < p.r + frog.r) {
      p.dead = true;
      if (p.type === "rocket") {
        rocketTimer = 4;
        RNF.sfx.power();
        shell.triggerShake(5, 0.15);
      } else {
        score += 25;
        RNF.sfx.score();
      }
      particles.burst(p.x, p.y, p.type === "rocket" ? "#fbbf24" : "#22d3ee", 12);
    }
  });
  pickups = pickups.filter(function (p) { return !p.dead && p.x > -30; });

  rain.forEach(function (r) {
    r.x -= curSpeed * 0.3;
    r.y += r.sp;
    if (r.y > H) { r.y = -10; r.x = Math.random() * W; }
    if (r.x < 0) r.x = W;
  });

  particles.trail(frog.x - 10, frog.y, rocketTimer > 0 ? "#fbbf24" : "#34d399");

  particles.update(dt);
  draw(curSpeed);
  updateHud();
  animId = requestAnimationFrame(loop);
}

function rectCircle(rx, ry, rw, rh, cx, cy, cr) {
  var nx = Math.max(rx, Math.min(cx, rx + rw));
  var ny = Math.max(ry, Math.min(cy, ry + rh));
  return Math.hypot(cx - nx, cy - ny) < cr;
}

function draw(curSpeed) {
  ctx.save();
  shell.applyShake(ctx);

  var grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, "#0a0e1a");
  grad.addColorStop(0.6, "#0f1628");
  grad.addColorStop(1, "#060a12");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = "rgba(34,211,238,0.08)";
  for (var gx = 0; gx < W; gx += 40) {
    ctx.beginPath();
    ctx.moveTo(gx - (scrollX % 40), 0);
    ctx.lineTo(gx - (scrollX % 40) - 80, H);
    ctx.stroke();
  }

  rain.forEach(function (r) {
    ctx.strokeStyle = "rgba(34,211,238,0.25)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(r.x, r.y);
    ctx.lineTo(r.x - 3, r.y + r.len);
    ctx.stroke();
  });

  ctx.fillStyle = "rgba(167,139,250,0.15)";
  ctx.fillRect(0, groundY, W, H - groundY);
  ctx.strokeStyle = "#a78bfa";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();

  obstacles.forEach(function (o) {
    ctx.shadowBlur = 10;
    ctx.shadowColor = o.type === "fly" ? "#f472b6" : "#22d3ee";
    ctx.fillStyle = o.type === "fly" ? "rgba(244,114,182,0.7)" : "rgba(34,211,238,0.5)";
    ctx.fillRect(o.x, o.y, o.w, o.h);
    ctx.strokeStyle = o.type === "fly" ? "#f472b6" : "#22d3ee";
    ctx.strokeRect(o.x, o.y, o.w, o.h);
  });
  ctx.shadowBlur = 0;

  pickups.forEach(function (p) {
    ctx.shadowBlur = 12;
    ctx.shadowColor = p.type === "rocket" ? "#fbbf24" : "#22d3ee";
    ctx.fillStyle = p.type === "rocket" ? "#fbbf24" : "#22d3ee";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.shadowBlur = 0;

  if (shield > 0) {
    ctx.strokeStyle = "rgba(167,139,250,0.6)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(frog.x, frog.y, frog.r + 8 + Math.sin(frog.wingT) * 2, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.shadowBlur = 16;
  ctx.shadowColor = "#34d399";
  ctx.fillStyle = "#34d399";
  ctx.beginPath();
  ctx.ellipse(frog.x, frog.y, frog.r, frog.r * 0.85, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(frog.x + 8, frog.y - 5, 6, 0, Math.PI * 2);
  ctx.arc(frog.x + 18, frog.y - 5, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#0a0e1a";
  ctx.beginPath();
  ctx.arc(frog.x + 10, frog.y - 5, 2.5, 0, Math.PI * 2);
  ctx.arc(frog.x + 20, frog.y - 5, 2.5, 0, Math.PI * 2);
  ctx.fill();

  if (rocketTimer > 0) {
    ctx.fillStyle = "#fbbf24";
    ctx.beginPath();
    ctx.moveTo(frog.x - 25, frog.y + 5);
    ctx.lineTo(frog.x - 40, frog.y);
    ctx.lineTo(frog.x - 25, frog.y - 5);
    ctx.fill();
  }

  ctx.shadowBlur = 0;
  particles.draw(ctx);
  ctx.restore();
}
</script>
</body>
</html>
