<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Overdrive Cyber Pong · 超光速霓虹乒乓</title>

  <script src="/sdk/rnf-i18n.js?v=20260723h"></script>
  <script src="/sdk/rnf-game-packs.js?v=20260723h"></script>
  <script src="/sdk/rnf-game-sdk.js?v=20260723h"></script>
</head>
<body>
<script>
RNF.init();
var shell = RNF.buildShell({
  title: "Overdrive Cyber Pong",
  creator: "HyperPong_Studio",
  subtitle: "曲球軌跡 · 重力井 · AI 難度 · 雙人對戰 · 觸控拖曳擋板",
  width: 960,
  height: 520,
  bgmStyle: "pulse",
  difficulties: (function () {
    var loc = RNF.getLocale();
    var zh = loc.indexOf("zh") === 0;
    var cn = loc === "zh-CN";
    return [
      { id: "easy", label: RNF.t("diff.easy"), speedMult: 0.85, scoreMult: 1, ai: 0.75, desc: zh ? (cn ? "AI 较慢，先 5 分胜" : "AI 較慢，先 5 分勝") : "Slower AI — first to 5" },
      { id: "normal", label: RNF.t("diff.normal"), speedMult: 1, scoreMult: 1.25, ai: 1, desc: zh ? (cn ? "平衡对战，先 7 分胜" : "平衡對戰，先 7 分勝") : "Balanced — first to 7" },
      { id: "hard", label: RNF.t("diff.hard"), speedMult: 1.12, scoreMult: 1.6, ai: 1.35, desc: zh ? (cn ? "更快球速与更强 AI，先 9 分胜" : "更快球速與更強 AI，先 9 分勝") : "Faster ball & stronger AI — first to 9" },
      { id: "versus", label: RNF.t("diff.versus"), speedMult: 1, scoreMult: 1.15, ai: 1, desc: zh ? (cn ? "本地双人同屏幕，先 7 分胜" : "本地雙人同螢幕，先 7 分勝") : "Local 2P same screen — first to 7" }
    ];
  })(),
  highlights: ["曲球軌跡", "重力井", "觸控拖曳", "粒子拖尾", "雙人對戰"],
  help: {
    about: "霓虹風格的乒乓球對戰。曲球 spin 受擋板擊球點影響，重力井會偏轉軌跡。先達目標分數者獲勝。",
    features: [
      "主選單難度決定 AI 強度與勝利分數",
      "曲球 spin 與動態重力場",
      "擊球角度取決於碰板位置與擋板移動速度",
      "手機可拖曳左側擋板，右側虛擬鍵控制（雙人模式）"
    ],
    controls: [
      "W / S 或 ↑ / ↓：移動擋板",
      "觸控：在左半場拖曳控制左擋板",
      "雙人模式：左 W/S · 右 ↑/↓ 或右側觸控鍵",
      "主選單選「雙人對戰」進入本地雙人"
    ],
    tips: [
      "利用重力井製造意外反角",
      "移動中擊球可施加更強曲球",
      "困難 AI 會預測落點並提前站位"
    ]
  },
  onStop: cleanup,
  onStart: startGame
});

var W = 960, H = 520;
var ctx, particles, running, loopId, lastT, keys = {};
var left, right, ball, scoreL, scoreR, gravityZones, animT = 0;
var speedScale = 1, diffId = "normal", winScore = 7, aiMult = 1;
var pointerY = null, rallyCount = 0, speedBurst = 0;
var isVersus = false;

function cleanup() {
  shell.detachKeyboard();
  shell.detachTouchControls();
  running = false;
  if (loopId) cancelAnimationFrame(loopId);
  loopId = null;
  shell.canvas.removeEventListener("pointerdown", onPtrDown);
  shell.canvas.removeEventListener("pointermove", onPtrMove);
  shell.canvas.removeEventListener("pointerup", onPtrUp);
  shell.canvas.removeEventListener("pointercancel", onPtrUp);
  window.removeEventListener("keydown", onKeyDown);
  window.removeEventListener("keyup", onKeyUp);
}

function applyDifficulty() {
  var d = shell.getDifficulty() || {};
  diffId = d.id || "normal";
  aiMult = d.ai || 1;
  isVersus = diffId === "versus";
  winScore = diffId === "easy" ? 5 : diffId === "hard" ? 9 : 7;
}

function resetBall(dir) {
  var base = (240 + rallyCount * 8) * speedScale;
  ball = {
    x: W / 2, y: H / 2,
    vx: dir * Math.min(base, 420), vy: (Math.random() - 0.5) * 140 * speedScale,
    r: 9, spin: 0, trail: [], glow: "#fff"
  };
  rallyCount = 0;
}

function startGame() {
  cleanup();
  speedScale = shell.getSpeedScale();
  applyDifficulty();
  ctx = shell.ctx; particles = shell.particles;
  scoreL = 0; scoreR = 0; animT = 0; pointerY = null; speedBurst = 0;
  left = { x: 24, y: 210, w: 14, h: 100, vy: 0, prevY: 210 };
  right = { x: W - 38, y: 210, w: 14, h: 100, vy: 0, prevY: 210 };
  gravityZones = [
    { x: 320, y: 150, r: 72, str: 200, pulse: 0 },
    { x: 640, y: 340, r: 68, str: -175, pulse: 1.2 },
    { x: 480, y: 260, r: 50, str: 90, pulse: 2.4 }
  ];
  resetBall(Math.random() < 0.5 ? 1 : -1);
  updateHud(); running = true; keys = {};
  shell.attachKeyboard(keys);
  if (!isVersus) {
    shell.attachTouchControls({
      keys: keys,
      buttons: [
        { code: "KeyW", label: "W", side: "left", hold: true },
        { code: "KeyS", label: "S", side: "left", hold: true }
      ],
      swipe: { threshold: 30, up: "KeyW", down: "KeyS" }
    });
  } else {
    shell.attachTouchControls({
      keys: keys,
      buttons: [
        { code: "KeyW", label: "W", side: "left", hold: true },
        { code: "KeyS", label: "S", side: "left", hold: true },
        { code: "ArrowUp", label: "↑", side: "right", hold: true },
        { code: "ArrowDown", label: "↓", side: "right", hold: true }
      ]
    });
  }
  shell.canvas.addEventListener("pointerdown", onPtrDown);
  shell.canvas.addEventListener("pointermove", onPtrMove);
  shell.canvas.addEventListener("pointerup", onPtrUp);
  shell.canvas.addEventListener("pointercancel", onPtrUp);
  window.addEventListener("keydown", onKeyDown);
  window.addEventListener("keyup", onKeyUp);
  lastT = performance.now();
  loopId = requestAnimationFrame(loop);
}

function canvasY(e) {
  var rect = shell.canvas.getBoundingClientRect();
  return (e.clientY - rect.top) * (H / rect.height);
}

var ptrActive = false;
function onPtrDown(e) {
  var x = (e.clientX - shell.canvas.getBoundingClientRect().left) * (W / shell.canvas.getBoundingClientRect().width);
  if (x < W * 0.55) { ptrActive = true; pointerY = canvasY(e); }
}
function onPtrMove(e) { if (ptrActive) pointerY = canvasY(e); }
function onPtrUp() { ptrActive = false; }

function onKeyDown(e) { keys[e.code] = true; }
function onKeyUp(e) { keys[e.code] = false; }

function updateHud() {
  var modeTxt = isVersus ? RNF.t("diff.versus") : (shell.getDifficulty() || {}).label || "AI";
  shell.setHud(
    '<div><span>' + RNF.t("hud.left") + '</span><b style="color:#22d3ee">' + scoreL + '</b></div>' +
    '<div><span>' + RNF.t("hud.right") + '</span><b style="color:#f472b6">' + scoreR + '</b></div>' +
    '<div><span>' + RNF.t("hud.target") + '</span><b>' + winScore + '</b></div>' +
    '<div><span>' + RNF.t("hud.mode") + '</span><b style="font-size:.72rem">' + modeTxt + '</b></div>' +
    '<div><span>' + RNF.t("hud.spin") + '</span><b>' + Math.abs(ball.spin).toFixed(1) + '</b></div>' +
    '<div><span>Rally</span><b>' + rallyCount + '</b></div>'
  );
}

function movePaddle(p, up, down, dt) {
  var spd = 340 * speedScale;
  p.prevY = p.y;
  if (up) p.y -= spd * dt;
  if (down) p.y += spd * dt;
  p.vy = (p.y - p.prevY) / Math.max(dt, 0.001);
  p.y = Math.max(16, Math.min(H - p.h - 16, p.y));
}

function aiMove(paddle, dt) {
  var predictY = ball.y;
  if (ball.vx > 0) {
    var tHit = (paddle.x - ball.x) / (ball.vx || 1);
    if (tHit > 0 && tHit < 3) {
      predictY = ball.y + ball.vy * tHit + ball.spin * tHit * tHit * 18;
      predictY += Math.sin(animT * 2) * (8 / aiMult);
    }
  }
  var target = predictY - paddle.h / 2;
  var react = (diffId === "easy" ? 180 : diffId === "hard" ? 420 : 280) * aiMult * speedScale;
  var err = (diffId === "easy" ? 28 : diffId === "hard" ? 6 : 14) / aiMult;
  target += (Math.random() - 0.5) * err;
  paddle.prevY = paddle.y;
  if (paddle.y + paddle.h / 2 < target - 8) paddle.y += react * dt;
  else if (paddle.y + paddle.h / 2 > target + 8) paddle.y -= react * dt;
  paddle.vy = (paddle.y - paddle.prevY) / Math.max(dt, 0.001);
  paddle.y = Math.max(16, Math.min(H - paddle.h - 16, paddle.y));
}

function hitPaddle(p, side) {
  if (ball.x + ball.r <= p.x || ball.x - ball.r >= p.x + p.w) return false;
  if (ball.y + ball.r < p.y || ball.y - ball.r > p.y + p.h) return false;
  ball.vx = side * Math.abs(ball.vx) * 1.045;
  var rel = (ball.y - (p.y + p.h / 2)) / (p.h / 2);
  ball.vy += rel * 240 + p.vy * 0.35;
  ball.spin += rel * 4 + p.vy * 0.02;
  ball.x = side > 0 ? p.x + p.w + ball.r : p.x - ball.r;
  rallyCount++;
  speedBurst = 0.2;
  RNF.sfx.combo(Math.min(rallyCount, 8));
  shell.triggerShake(4 + rallyCount * 0.3, 0.1);
  particles.burst(ball.x, ball.y, side > 0 ? "#22d3ee" : "#f472b6", 10);
  return true;
}

function loop(now) {
  if (!running) return;
  var dt = Math.min(0.033, (now - lastT) / 1000);
  lastT = now; animT += dt;
  speedBurst = Math.max(0, speedBurst - dt);

  if (pointerY != null && ptrActive) {
    left.y += (pointerY - left.h / 2 - left.y) * Math.min(1, dt * 14);
    left.y = Math.max(16, Math.min(H - left.h - 16, left.y));
  } else {
    movePaddle(left, keys["KeyW"], keys["KeyS"], dt);
  }

  if (isVersus) movePaddle(right, keys["ArrowUp"], keys["ArrowDown"], dt);
  else aiMove(right, dt);

  gravityZones.forEach(function (z) {
    z.pulse += dt;
    var dx = ball.x - z.x, dy = ball.y - z.y, d = Math.sqrt(dx * dx + dy * dy);
    if (d < z.r) {
      var f = (1 - d / z.r) * z.str * dt;
      ball.vy += (dy / (d || 1)) * f * 0.025;
      ball.vx += (dx / (d || 1)) * f * 0.012;
      if (shell.isHighQuality()) particles.trail(ball.x, ball.y, z.str > 0 ? "#22d3ee" : "#a78bfa");
    }
  });

  ball.vy += ball.spin * dt * 48;
  ball.vx *= 1 + dt * 0.02 * Math.min(rallyCount, 12);
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  if (ball.y - ball.r < 12) { ball.y = 12 + ball.r; ball.vy = Math.abs(ball.vy); RNF.sfx.hit(); }
  if (ball.y + ball.r > H - 12) { ball.y = H - 12 - ball.r; ball.vy = -Math.abs(ball.vy); RNF.sfx.hit(); }

  hitPaddle(left, 1);
  hitPaddle(right, -1);

  ball.trail.push({ x: ball.x, y: ball.y, spin: ball.spin });
  if (ball.trail.length > 22) ball.trail.shift();
  if (shell.isHighQuality()) particles.trail(ball.x, ball.y, "#a78bfa");

  if (ball.x < -30) {
    scoreR++; RNF.sfx.score();
    if (scoreR >= winScore) {
      cleanup();
      shell.gameOver(scoreL * 120 + rallyCount * 5, { winner: "right", difficulty: diffId, mode: isVersus ? "versus" : "ai" });
      return;
    }
    resetBall(1);
  }
  if (ball.x > W + 30) {
    scoreL++; RNF.sfx.score();
    if (scoreL >= winScore) {
      cleanup();
      shell.gameOver(scoreL * 120 + scoreR * 40 + rallyCount * 5, { winner: "left", difficulty: diffId, mode: isVersus ? "versus" : "ai" });
      return;
    }
    resetBall(-1);
  }

  particles.update(dt);
  draw(dt); updateHud();
  loopId = requestAnimationFrame(loop);
}

function drawCurveHint() {
  if (!shell.isHighQuality() || Math.abs(ball.spin) < 0.5) return;
  ctx.save(); ctx.strokeStyle = "rgba(251,191,36,0.25)"; ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 6]); ctx.beginPath(); ctx.moveTo(ball.x, ball.y);
  for (var t = 0; t < 1; t += 0.08) {
    var px = ball.x + ball.vx * t * 0.15;
    var py = ball.y + ball.vy * t * 0.15 + ball.spin * t * t * 80;
    ctx.lineTo(px, py);
  }
  ctx.stroke(); ctx.setLineDash([]); ctx.restore();
}

function draw(dt) {
  ctx.save(); shell.applyShake(ctx);
  var bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, "#060810"); bg.addColorStop(1, "#0a0e18");
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = "rgba(34,211,238,0.12)"; ctx.setLineDash([8, 14]);
  ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
  ctx.setLineDash([]);

  gravityZones.forEach(function (z) {
    var pulse = 0.7 + Math.sin(z.pulse * 2) * 0.3;
    var g = ctx.createRadialGradient(z.x, z.y, 0, z.x, z.y, z.r);
    g.addColorStop(0, z.str > 0 ? "rgba(34,211,238," + (0.22 * pulse) + ")" : "rgba(167,139,250," + (0.22 * pulse) + ")");
    g.addColorStop(1, "transparent");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(z.x, z.y, z.r * pulse, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = z.str > 0 ? "rgba(34,211,238,0.35)" : "rgba(167,139,250,0.35)";
    ctx.stroke();
    ctx.fillStyle = "#94a3b8"; ctx.font = "10px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(z.str > 0 ? RNF.t("label.attract") : RNF.t("label.repel"), z.x, z.y + 4);
  });

  drawCurveHint();

  ball.trail.forEach(function (t, i) {
    var a = (i + 1) / ball.trail.length;
    ctx.fillStyle = "rgba(34,211,238," + a * 0.45 + ")";
    ctx.shadowBlur = 10; ctx.shadowColor = "#22d3ee";
    ctx.beginPath(); ctx.arc(t.x, t.y, ball.r * a * 0.75, 0, Math.PI * 2); ctx.fill();
  });
  ctx.shadowBlur = 0;

  ctx.fillStyle = "#22d3ee"; ctx.shadowBlur = 16; ctx.shadowColor = "#22d3ee";
  ctx.beginPath(); ctx.roundRect(left.x, left.y, left.w, left.h, 4); ctx.fill();
  ctx.fillStyle = "#f472b6"; ctx.shadowColor = "#f472b6";
  ctx.beginPath(); ctx.roundRect(right.x, right.y, right.w, right.h, 4); ctx.fill();

  ctx.fillStyle = "#fff"; ctx.shadowBlur = 18; ctx.shadowColor = "#fff";
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r + (speedBurst > 0 ? 2 : 0), 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  if (speedBurst > 0) {
    ctx.fillStyle = "rgba(251,191,36,0.15)"; ctx.fillRect(0, 0, W, H);
  }

  particles.draw(ctx);
  ctx.restore();
}
</script>
</body>
</html>
