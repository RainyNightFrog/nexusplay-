<script>
RNF.init();
var shell = RNF.buildShell({
  title: "Void Brick Breaker",
  creator: "PixelArchitect",
  subtitle: "¦h²y¤Àµõ ¡P ¹p®g¾×ªO ¡P ¶Â¬}ºÏ¤O ¡P Ãz¬µ¡þ¿ûÅK¿j ¡P ¤â¾÷©ì¦²¡ÏµêÀÀÁä",
  width: 960,
  height: 520,
  bgmStyle: "pulse",
  highlights: ["¥|¬qÃø«×", "¦h²y¡þ¹p®g", "¯S®í¿j¶ô", "Combo ³s¯}", "Ä²±±´Nºü"],
  help: {
    about: "µêªÅ¯x°}¤¤ªº¸g¨å¥´¿j¶ô¡C¥Î¾×ªO¤Ï¼u²yÅéÀ»¸H¿j¶ô¡A²MªÅ¥i¯}Ãa¿j§Y¥i¹LÃö¡C",
    features: [
      "¥|¬qÃø«×¡G²y³t¡B¿j¶ô HP¡B¹D¨ã±¼¸¨²v¦P¨B½Õ¾ã",
      "¦h²y¤Àµõ¡BºÏ¤O§lªþ¡B¹p®g³s®g¡B¥[¼e¾×ªO¡BÂH²y¡BÃB¥~¥Í©R",
      "¿ûÅK¿j¶È¹p®g¥i¯}¡BÃz¬µ¿j³sÂê¡Bª÷¿j°ª¤À¼úÀy",
      "³sÄò¯}¿j Combo ­¿²v¥[¤À»PÀO­i²É¤l",
      "®à­±Áä½L¡Ï¤â¾÷©ì¦²¾×ªO¡þµêÀÀ¤è¦VÁä¡þµo®gÁä"
    ],
    controls: [
      "¡ö ¡÷ ©Î A D¡G²¾°Ê¾×ªO",
      "ªÅ¥ÕÁä¡þÄ²±±¡u®g¡v¡Gµo®g¹p®g¡]¦³§N«o¡^",
      "¤â¾÷¡G¦bµe­±¤W©ì¦²¥i§Ö³t©w¦ì¾×ªO"
    ],
    tips: [
      "¦h²y¹D¨ã¥i¦P®É¯}Ãa¦h±Æ¿j¶ô",
      "ºÏ¤O¹D¨ãÅý²y°¾¦V¾×ªO¤è¦V",
      "Ãz¬µ¿j·|¾_¶Ë©P³ò¿j¶ô¡Aµ½¥Î³sÂê²M³õ",
      "¿ûÅK¦Ç¿j»Ý¥Î¹p®gÀ»¯}"
    ]
  },
  onStop: cleanup,
  onStart: startGame
});

var W = shell.width, H = shell.height;
var ctx, particles, animId, running, gameEnded, keys, lastTs;
var paddle, balls, bricks, lasers, powerups, stars, score, lives, level;
var laserCooldown, magnetTimer, wideTimer, stickyTimer, laserModeTimer;
var combo, comboTimer, speedScale, diffId, highQ, diffTun;
var PADDLE_SPEED = 360, BALL_BASE = 240;

function diffTuning() {
  var map = {
    easy: { hpMult: 0.85, ballMult: 0.88, powerRate: 0.14, laserCd: 0.28, rowsBonus: 0 },
    normal: { hpMult: 1, ballMult: 1, powerRate: 0.1, laserCd: 0.24, rowsBonus: 0 },
    hard: { hpMult: 1.25, ballMult: 1.12, powerRate: 0.08, laserCd: 0.2, rowsBonus: 1 },
    extreme: { hpMult: 1.55, ballMult: 1.22, powerRate: 0.06, laserCd: 0.17, rowsBonus: 2 }
  };
  return map[diffId] || map.normal;
}

function cleanup() {
  shell.detachKeyboard();
  shell.detachTouchControls();
  running = false;
  if (animId) cancelAnimationFrame(animId);
  animId = null;
  window.removeEventListener("keydown", onKey, true);
  window.removeEventListener("keyup", onKeyUp, true);
  if (shell && shell.canvas) {
    shell.canvas.removeEventListener("pointerdown", onPointerDown);
    shell.canvas.removeEventListener("pointermove", onPointerMove);
    shell.canvas.removeEventListener("pointerup", onPointerUp);
    shell.canvas.removeEventListener("pointercancel", onPointerUp);
  }
}

var dragActive = false;
function onPointerDown(e) {
  if (!running) return;
  dragActive = true;
  movePaddleToEvent(e);
}
function onPointerMove(e) {
  if (!running || !dragActive) return;
  movePaddleToEvent(e);
}
function onPointerUp() { dragActive = false; }
function movePaddleToEvent(e) {
  var rect = shell.canvas.getBoundingClientRect();
  if (!rect.width) return;
  var clientX = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
  var x = (clientX - rect.left) * (W / rect.width);
  paddle.x = Math.max(8, Math.min(W - paddle.w - 8, x - paddle.w / 2));
}

function onKey(e) {
  if (!running) return;
  keys[e.code] = true;
  if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
  if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
  if (e.code === "Space") keys.fire = true;
  if (e.code === "ArrowLeft" || e.code === "ArrowRight" || e.code === "Space") e.preventDefault();
}
function onKeyUp(e) {
  keys[e.code] = false;
  if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = false;
  if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = false;
  if (e.code === "Space") keys.fire = false;
}

function initStars() {
  stars = [];
  var n = highQ ? 90 : 40;
  for (var i = 0; i < n; i++) {
    stars.push({ x: Math.random() * W, y: Math.random() * H, s: Math.random() * 2 + 0.5, sp: 0.15 + Math.random() * 0.9 });
  }
}

function pickPower() {
  if (Math.random() > diffTun.powerRate) return null;
  var pool = ["multiball", "magnet", "wide", "laser", "life"];
  if (Math.random() < 0.12) pool.push("sticky");
  return pool[Math.floor(Math.random() * pool.length)];
}

function makeLevel(lv) {
  bricks = [];
  var rows = Math.min(5 + lv + diffTun.rowsBonus, 11), cols = 14;
  var bw = (W - 36) / cols, bh = 20;
  var palette = ["#22d3ee", "#a78bfa", "#f472b6", "#34d399", "#fbbf24"];
  for (var r = 0; r < rows; r++) {
    for (var c = 0; c < cols; c++) {
      if (Math.random() < 0.9) {
        var type = "normal";
        var roll = Math.random();
        if (roll < 0.06 && lv >= 2) type = "steel";
        else if (roll < 0.12) type = "explosive";
        else if (roll < 0.18) type = "golden";
        else if (roll < 0.35 && r < 3) type = "reinforced";
        var hp = Math.max(1, Math.round((1 + Math.floor(r / 2) + Math.floor(lv / 2)) * diffTun.hpMult));
        if (type === "steel") hp = 999;
        else if (type === "reinforced") hp += 1;
        else if (type === "golden") hp = 1;
        bricks.push({
          x: 18 + c * bw + 1, y: 36 + r * (bh + 3),
          w: bw - 2, h: bh, hp: hp, maxHp: hp,
          type: type,
          color: type === "steel" ? "#64748b" : type === "golden" ? "#fbbf24" : type === "explosive" ? "#fb7185" : palette[r % palette.length],
          power: type === "normal" || type === "reinforced" ? pickPower() : (type === "golden" && Math.random() < 0.5 ? pickPower() : null)
        });
      }
    }
  }
}

function spawnBall(x, y, vx, vy) {
  var sm = speedScale * diffTun.ballMult;
  balls.push({
    x: x != null ? x : W / 2,
    y: y != null ? y : H - 72,
    vx: vx != null ? vx : (Math.random() - 0.5) * 160 * sm,
    vy: vy != null ? vy : -BALL_BASE * sm,
    r: 7, stuck: false
  });
}

function startGame() {
  cleanup();
  ctx = shell.ctx;
  particles = shell.particles;
  highQ = shell.isHighQuality();
  speedScale = shell.getSpeedScale();
  diffId = (shell.getDifficulty() || {}).id || "normal";
  diffTun = diffTuning();
  score = 0; lives = 3; level = 1; combo = 0; comboTimer = 0;
  keys = { left: false, right: false, fire: false };
  shell.attachKeyboard(keys);
  paddle = { x: W / 2 - 55, y: H - 42, w: 110, h: 14, baseW: 110 };
  balls = []; lasers = []; powerups = [];
  laserCooldown = 0; magnetTimer = 0; wideTimer = 0; stickyTimer = 0; laserModeTimer = 0;
  gameEnded = false;
  initStars();
  makeLevel(level);
  spawnBall();
  running = true;
  window.addEventListener("keydown", onKey, true);
  window.addEventListener("keyup", onKeyUp, true);
  shell.canvas.addEventListener("pointerdown", onPointerDown);
  shell.canvas.addEventListener("pointermove", onPointerMove);
  shell.canvas.addEventListener("pointerup", onPointerUp);
  shell.canvas.addEventListener("pointercancel", onPointerUp);
  shell.attachTouchControls({
    keys: keys,
    buttons: [
      { code: "ArrowLeft", label: "?", side: "left", hold: true },
      { code: "ArrowRight", label: "?", side: "left", hold: true },
      { code: "Space", label: "®g", side: "right", hold: true, danger: true, wide: true }
    ]
  });
  lastTs = performance.now();
  animId = requestAnimationFrame(loop);
}

function fireLaser() {
  var cd = laserModeTimer > 0 ? diffTun.laserCd * 0.45 : diffTun.laserCd;
  if (laserCooldown > 0) return;
  laserCooldown = cd;
  var vy = -520 * speedScale;
  var cx = paddle.x + paddle.w / 2;
  lasers.push({ x: cx - 2, y: paddle.y, w: 4, h: 18, vy: vy });
  if (laserModeTimer > 0 || wideTimer > 0) {
    lasers.push({ x: cx - 14, y: paddle.y, w: 3, h: 14, vy: vy * 0.95 });
    lasers.push({ x: cx + 11, y: paddle.y, w: 3, h: 14, vy: vy * 0.95 });
  }
  RNF.sfx.laser();
  particles.burst(cx, paddle.y, "#fbbf24", highQ ? 6 : 3);
}

function breakBrick(br, byLaser) {
  if (br.dead) return;
  if (br.type === "steel" && !byLaser) {
    RNF.sfx.hit();
    return;
  }
  br.hp--;
  if (br.hp > 0) { RNF.sfx.hit(); return; }
  br.dead = true;
  combo++; comboTimer = 2.8;
  var mult = 1 + Math.min(combo, 12) * 0.08;
  var pts = br.type === "golden" ? 50 : br.type === "explosive" ? 25 : 10;
  score += Math.floor(pts * level * mult);
  shell.triggerShake(br.type === "explosive" ? 6 : 3, 0.12);
  particles.burst(br.x + br.w / 2, br.y + br.h / 2, br.color, highQ ? 16 : 8);
  RNF.sfx.pop();
  if (combo > 2) RNF.sfx.combo(Math.min(combo, 10));
  if (br.power) {
    powerups.push({ x: br.x + br.w / 2, y: br.y + br.h / 2, vy: 100 * speedScale, type: br.power, spin: 0 });
  }
  if (br.type === "explosive") {
    var cx = br.x + br.w / 2, cy = br.y + br.h / 2;
    bricks.forEach(function (nb) {
      if (nb.dead) return;
      if (Math.hypot(nb.x + nb.w / 2 - cx, nb.y + nb.h / 2 - cy) < 70) {
        nb.hp -= 2;
        if (nb.hp <= 0) breakBrick(nb, false);
      }
    });
  }
}

function applyPower(type) {
  RNF.sfx.power();
  shell.triggerShake(5, 0.14);
  if (type === "multiball") {
    var copy = balls.slice();
    copy.forEach(function (b) {
      spawnBall(b.x, b.y, -b.vx * 0.85 + (Math.random() - 0.5) * 40, -Math.abs(b.vy) * 1.05);
    });
  } else if (type === "magnet") magnetTimer = 9;
  else if (type === "wide") wideTimer = 10;
  else if (type === "laser") laserModeTimer = 12;
  else if (type === "sticky") stickyTimer = 8;
  else if (type === "life") { lives = Math.min(5, lives + 1); RNF.sfx.confirm(); }
}

function updateHud() {
  shell.setHud(
    '<div><span>¤À¼Æ</span><b>' + score.toLocaleString() + '</b></div>' +
    '<div><span>¥Í©R</span><b>' + lives + '</b></div>' +
    '<div><span>Ãö¥d</span><b>' + level + '</b></div>' +
    '<div><span>²y¼Æ</span><b>' + balls.length + '</b></div>' +
    (combo > 1 ? '<div><span>Combo</span><b style="color:#fbbf24">x' + combo + '</b></div>' : '') +
    (magnetTimer > 0 ? '<div><span>ºÏ¤O</span><b style="color:#a78bfa">ON</b></div>' : '') +
    (laserModeTimer > 0 ? '<div><span>¹p®g+</span><b style="color:#fbbf24">ON</b></div>' : '')
  );
}

function die() {
  if (gameEnded) return;
  gameEnded = true;
  running = false;
  RNF.sfx.die();
  shell.triggerShake(12, 0.4);
  cleanup();
  shell.gameOver(score, { level: level, combo: combo });
}

function loop(ts) {
  if (!running) return;
  var dt = Math.min(0.033, (ts - lastTs) / 1000);
  lastTs = ts;

  var spd = PADDLE_SPEED * speedScale * dt;
  if (keys.left || keys["ArrowLeft"] || keys["KeyA"]) paddle.x -= spd;
  if (keys.right || keys["ArrowRight"] || keys["KeyD"]) paddle.x += spd;
  paddle.x = Math.max(8, Math.min(W - paddle.w - 8, paddle.x));
  if (keys.fire || keys["Space"]) fireLaser();

  laserCooldown = Math.max(0, laserCooldown - dt);
  magnetTimer = Math.max(0, magnetTimer - dt);
  wideTimer = Math.max(0, wideTimer - dt);
  stickyTimer = Math.max(0, stickyTimer - dt);
  laserModeTimer = Math.max(0, laserModeTimer - dt);
  comboTimer = Math.max(0, comboTimer - dt);
  if (comboTimer <= 0 && combo > 0) combo = 0;

  paddle.w = wideTimer > 0 ? paddle.baseW * 1.35 : paddle.baseW;

  balls.forEach(function (b) {
    if (b.stuck) {
      b.x = paddle.x + paddle.w / 2;
      b.y = paddle.y - b.r - 1;
      if (!stickyTimer) {
        b.stuck = false;
        b.vy = -Math.abs(BALL_BASE * speedScale * diffTun.ballMult);
      }
      return;
    }
    if (magnetTimer > 0 && b.y > H * 0.45) {
      b.vx += (paddle.x + paddle.w / 2 - b.x) * 3.2 * dt;
    }
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < b.r) { b.x = b.r; b.vx = Math.abs(b.vx); RNF.sfx.hit(); }
    if (b.x > W - b.r) { b.x = W - b.r; b.vx = -Math.abs(b.vx); RNF.sfx.hit(); }
    if (b.y < b.r) { b.y = b.r; b.vy = Math.abs(b.vy); }
    if (b.y > H + 40) b.dead = true;

    if (b.y + b.r >= paddle.y && b.y - b.r <= paddle.y + paddle.h && b.x >= paddle.x - 4 && b.x <= paddle.x + paddle.w + 4 && b.vy > 0) {
      b.y = paddle.y - b.r;
      if (stickyTimer > 0) {
        b.stuck = true; b.vx = 0; b.vy = 0;
      } else {
        b.vy = -Math.abs(b.vy);
        var hit = (b.x - paddle.x) / paddle.w - 0.5;
        b.vx = hit * 260 * speedScale;
      }
      RNF.sfx.hit();
      particles.burst(b.x, b.y, "#22d3ee", 5);
    }

    bricks.forEach(function (br) {
      if (br.dead) return;
      if (b.x + b.r > br.x && b.x - b.r < br.x + br.w && b.y + b.r > br.y && b.y - b.r < br.y + br.h) {
        if (br.type !== "steel") {
          br.hp--;
          b.vy *= -1;
          if (br.hp <= 0) breakBrick(br, false);
          else RNF.sfx.hit();
        } else {
          b.vy *= -1;
          RNF.sfx.hit();
          particles.burst(b.x, b.y, "#94a3b8", 4);
        }
      }
    });
    if (highQ) particles.trail(b.x, b.y, "#a78bfa");
  });

  balls = balls.filter(function (b) { return !b.dead; });
  if (balls.length === 0) {
    lives--;
    shell.triggerShake(6, 0.2);
    if (lives <= 0) { die(); return; }
    spawnBall();
  }

  lasers.forEach(function (l) {
    l.y += l.vy * dt;
    bricks.forEach(function (br) {
      if (br.dead || l.dead) return;
      if (l.x + l.w > br.x && l.x < br.x + br.w && l.y < br.y + br.h && l.y + l.h > br.y) {
        breakBrick(br, true);
        l.dead = true;
      }
    });
  });
  lasers = lasers.filter(function (l) { return !l.dead && l.y > -30; });

  powerups.forEach(function (p) {
    p.spin += dt * 4;
    p.y += p.vy * dt;
    if (p.x > paddle.x && p.x < paddle.x + paddle.w && p.y > paddle.y - 12 && p.y < paddle.y + paddle.h + 8) {
      p.dead = true;
      applyPower(p.type);
    }
  });
  powerups = powerups.filter(function (p) { return !p.dead && p.y < H + 10; });

  bricks = bricks.filter(function (b) { return !b.dead; });
  if (bricks.filter(function (b) { return b.type !== "steel"; }).length === 0) {
    level++;
    RNF.sfx.score();
    shell.triggerShake(8, 0.25);
    makeLevel(level);
    balls = [{ x: W / 2, y: H - 72, vx: (Math.random() - 0.5) * 140 * speedScale, vy: -BALL_BASE * speedScale * diffTun.ballMult, r: 7, stuck: false }];
    score += 100 * level;
  }

  stars.forEach(function (s) {
    s.y += s.sp * 50 * dt;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  });

  particles.update(dt);
  draw();
  updateHud();
  animId = requestAnimationFrame(loop);
}

function drawBrick(br) {
  ctx.save();
  if (br.type === "steel") {
    ctx.fillStyle = "#475569";
    ctx.strokeStyle = "#94a3b8";
  } else {
    ctx.shadowBlur = highQ ? 10 : 4;
    ctx.shadowColor = br.color;
    ctx.fillStyle = br.color;
    ctx.globalAlpha = 0.35 + (br.maxHp > 1 ? br.hp / br.maxHp : 1) * 0.55;
    ctx.strokeStyle = "rgba(255,255,255,0.25)";
  }
  ctx.fillRect(br.x, br.y, br.w, br.h);
  ctx.strokeRect(br.x + 0.5, br.y + 0.5, br.w - 1, br.h - 1);
  if (br.type === "explosive") {
    ctx.fillStyle = "#fff";
    ctx.font = "bold 9px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("!", br.x + br.w / 2, br.y + br.h / 2 + 3);
  } else if (br.type === "golden") {
    ctx.fillStyle = "rgba(255,255,255,0.5)";
    ctx.fillRect(br.x + 2, br.y + 2, br.w - 4, 3);
  } else if (br.maxHp > 1 && br.type !== "steel") {
    ctx.fillStyle = "#fff";
    ctx.font = "9px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(br.hp, br.x + br.w / 2, br.y + br.h / 2 + 3);
  }
  ctx.restore();
}

function draw() {
  ctx.save();
  shell.applyShake(ctx);
  ctx.fillStyle = "#060a12";
  ctx.fillRect(0, 0, W, H);

  stars.forEach(function (s) {
    ctx.globalAlpha = 0.25 + s.sp * 0.35;
    ctx.fillStyle = "#fff";
    ctx.fillRect(s.x, s.y, s.s, s.s);
  });
  ctx.globalAlpha = 1;

  bricks.forEach(drawBrick);

  ctx.shadowBlur = 14;
  ctx.shadowColor = magnetTimer > 0 ? "#a78bfa" : wideTimer > 0 ? "#34d399" : "#22d3ee";
  ctx.fillStyle = magnetTimer > 0 ? "#a78bfa" : wideTimer > 0 ? "#34d399" : "#22d3ee";
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
  else ctx.rect(paddle.x, paddle.y, paddle.w, paddle.h);
  ctx.fill();
  if (magnetTimer > 0) {
    ctx.strokeStyle = "rgba(167,139,250,0.6)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(paddle.x + paddle.w / 2, paddle.y + paddle.h / 2, paddle.w * 0.55, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;

  balls.forEach(function (b) {
    ctx.shadowBlur = 12;
    ctx.shadowColor = b.stuck ? "#34d399" : "#f472b6";
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.shadowBlur = 0;

  lasers.forEach(function (l) {
    ctx.fillStyle = "#fbbf24";
    ctx.shadowBlur = 8;
    ctx.shadowColor = "#fbbf24";
    ctx.fillRect(l.x, l.y, l.w, l.h);
  });
  ctx.shadowBlur = 0;

  var labels = { multiball: "¦h", magnet: "ºÏ", wide: "¼e", laser: "¹p", sticky: "ÂH", life: "?" };
  powerups.forEach(function (p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.spin);
    ctx.fillStyle = p.type === "life" ? "#f472b6" : "#34d399";
    ctx.beginPath();
    ctx.arc(0, 0, 11, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.font = "bold 10px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(labels[p.type] || "?", 0, 4);
    ctx.restore();
  });

  if (combo > 2 && comboTimer > 0) {
    ctx.fillStyle = "rgba(251,191,36," + (0.4 + Math.sin(performance.now() * 0.01) * 0.2) + ")";
    ctx.font = "bold 18px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("COMBO x" + combo, W / 2, 28);
  }

  particles.draw(ctx);
  ctx.restore();
}
</script>
