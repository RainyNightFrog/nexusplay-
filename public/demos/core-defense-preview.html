<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoreDefense: Mindustry X</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0e14 0%, #1a1410 50%, #0d1117 100%);
      color: #e8e6e3;
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,140,50,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,140,50,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .glow { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.4; }
    .glow-1 { width: 400px; height: 400px; background: #ff6b2b; top: -100px; left: -100px; }
    .glow-2 { width: 300px; height: 300px; background: #4a90d9; bottom: -80px; right: -80px; }
    .panel {
      position: relative; z-index: 1;
      text-align: center; padding: 2.5rem;
      max-width: 560px;
    }
    .badge {
      display: inline-block;
      padding: 0.35rem 1rem;
      border-radius: 999px;
      background: rgba(255,107,43,0.15);
      border: 1px solid rgba(255,107,43,0.35);
      color: #ffb380;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #ffb380 50%, #ff6b2b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .sub { color: #8b949e; font-size: 0.95rem; margin-bottom: 1.5rem; }
    .stats {
      display: flex; gap: 1.5rem; justify-content: center;
      flex-wrap: wrap; margin-top: 2rem;
    }
    .stat {
      padding: 1rem 1.5rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,107,43,0.2);
      border-radius: 12px;
      min-width: 120px;
    }
    .stat-val { font-size: 1.5rem; font-weight: 700; color: #ff8c5a; }
    .stat-lbl { font-size: 0.7rem; color: #6e7681; margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .pulse {
      width: 80px; height: 80px; margin: 0 auto 1.5rem;
      border: 3px solid rgba(255,107,43,0.4);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; box-shadow: 0 0 0 0 rgba(255,107,43,0.3); }
      50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 40px 10px rgba(255,107,43,0.15); }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="panel">
    <div class="pulse"></div>
    <span class="badge">NeonTowers · 核心裂變</span>
    <h1>CoreDefense: Mindustry X</h1>
    <p class="sub">重工業塔防 × 全自動化工廠物流 · 3D 旗艦體驗</p>
    <p style="font-size:0.9rem;line-height:1.7;color:#adbac7;max-width:420px;margin:0 auto;">
      建立採礦帝國，拉起鋼鐵防線，抵禦異星機械狂潮。
    </p>
    <div class="stats">
      <div class="stat"><div class="stat-val">98.5k</div><div class="stat-lbl">遊玩次數</div></div>
      <div class="stat"><div class="stat-val">8.9k</div><div class="stat-lbl">按讚</div></div>
      <div class="stat"><div class="stat-val">4.91</div><div class="stat-lbl">評分</div></div>
    </div>
  </div>
</body>
</html>
