<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberFortune 012</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #050508;
      color: #f0e6d3;
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .matrix {
      position: fixed; inset: 0;
      background:
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,200,0.03) 2px, rgba(0,255,200,0.03) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(212,175,55,0.03) 2px, rgba(212,175,55,0.03) 4px);
    }
    .frame {
      position: relative; z-index: 1;
      padding: 3rem;
      border: 1px solid rgba(212,175,55,0.35);
      box-shadow: 0 0 60px rgba(0,255,200,0.08), inset 0 0 80px rgba(212,175,55,0.04);
      text-align: center;
      max-width: 520px;
    }
    .corner { position: absolute; width: 24px; height: 24px; border-color: #d4af37; border-style: solid; }
    .c-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .c-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .c-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .c-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    .badge {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: #00ffc8;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: clamp(1.6rem, 4.5vw, 2.25rem);
      font-weight: 700;
      color: #d4af37;
      text-shadow: 0 0 30px rgba(212,175,55,0.4);
      margin-bottom: 0.35rem;
    }
    .num { font-size: 2.5rem; font-weight: 300; color: #00ffc8; letter-spacing: 0.3em; margin: 1rem 0; }
    .sub { color: #8a8278; font-size: 0.9rem; line-height: 1.65; }
    .stats { display: flex; gap: 1rem; justify-content: center; margin-top: 2rem; flex-wrap: wrap; }
    .stat {
      padding: 0.75rem 1.25rem;
      border: 1px solid rgba(0,255,200,0.2);
      font-size: 0.8rem;
    }
    .stat b { display: block; color: #d4af37; font-size: 1.1rem; margin-bottom: 0.2rem; }
  </style>
</head>
<body>
  <div class="matrix"></div>
  <div class="frame">
    <span class="corner c-tl"></span><span class="corner c-tr"></span>
    <span class="corner c-bl"></span><span class="corner c-br"></span>
    <div class="badge">ELITEROYAL GAMING</div>
    <h1>CyberFortune 012</h1>
    <div class="num">0 · 1 · 2</div>
    <p class="sub">賽博博弈 × 大數據統計 · 復古電競霓虹旗艦</p>
    <div class="stats">
      <div class="stat"><b>64.2k</b>遊玩</div>
      <div class="stat"><b>5.6k</b>按讚</div>
      <div class="stat"><b>4.76</b>評分</div>
    </div>
  </div>
</body>
</html>
